<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KINO - Pure Cinema</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #000000;
            --bg-elevated: #0a0a0a;
            --bg-card: #111111;
            --bg-hover: #1a1a1a;
            --text: #ffffff;
            --text-secondary: #888888;
            --text-muted: #555555;
            --accent: #a3e635;
            --accent-dim: rgba(163, 230, 53, 0.15);
            --accent-glow: rgba(163, 230, 53, 0.4);
            --danger: #ef4444;
            --border: rgba(255, 255, 255, 0.06);
            --radius: 16px;
            --radius-sm: 10px;
            --radius-full: 9999px;
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --font-display: 'Space Grotesk', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Cursor Glow Effect */
        .cursor-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.15;
            transform: translate(-50%, -50%);
            transition: opacity 0.3s;
        }

        /* Toast Notifications */
        .toast-container {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        .toast {
            padding: 16px 24px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.95rem;
            font-weight: 500;
            animation: toastIn 0.4s ease, toastOut 0.4s ease 2.6s forwards;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .toast.success {
            border-color: var(--accent);
        }

        .toast.success i {
            color: var(--accent);
        }

        .toast.remove {
            border-color: var(--danger);
        }

        .toast.remove i {
            color: var(--danger);
        }

        @keyframes toastIn {
            from { 
                opacity: 0; 
                transform: translateY(20px) scale(0.95);
            }
            to { 
                opacity: 1; 
                transform: translateY(0) scale(1);
            }
        }

        @keyframes toastOut {
            from { 
                opacity: 1; 
                transform: translateY(0) scale(1);
            }
            to { 
                opacity: 0; 
                transform: translateY(-20px) scale(0.95);
            }
        }

        /* Navigation */
        .nav {
            position: fixed;
            left: 30px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .nav-item {
            width: 48px;
            height: 48px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            cursor: pointer;
            transition: var(--transition);
            position: relative;
        }

        .nav-item::before {
            content: attr(data-tooltip);
            position: absolute;
            left: 60px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 8px 14px;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
            color: var(--text);
        }

        .nav-item:hover::before {
            opacity: 1;
            visibility: visible;
        }

        .nav-item:hover {
            background: var(--bg-hover);
            color: var(--text);
            border-color: var(--text-muted);
        }

        .nav-item.active {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--bg);
        }

        .nav-item.active::before {
            display: none;
        }

        /* Main */
        .main {
            position: relative;
            z-index: 1;
        }

        /* Hero */
        .hero {
            position: relative;
            height: 100vh;
            display: flex;
            align-items: flex-end;
            overflow: hidden;
        }

        .hero-media {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .hero-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1.2s ease;
        }

        .hero-slide.active {
            opacity: 1;
        }

        .hero-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background: 
                linear-gradient(to top, var(--bg) 0%, transparent 50%),
                linear-gradient(to right, var(--bg) 0%, transparent 60%),
                linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, transparent 30%);
        }

        .hero-content {
            position: relative;
            z-index: 10;
            padding: 0 0 100px 120px;
            max-width: 650px;
        }

        .hero-label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: var(--accent);
            border-radius: var(--radius-sm);
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--bg);
            margin-bottom: 24px;
        }

        .hero-title {
            font-family: var(--font-display);
            font-size: clamp(2.5rem, 6vw, 5.5rem);
            font-weight: 700;
            line-height: 1;
            letter-spacing: -2px;
            margin-bottom: 20px;
        }

        .hero-meta {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 16px;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .hero-meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .hero-rating {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--accent);
            font-weight: 600;
        }

        .hero-desc {
            font-size: 0.95rem;
            line-height: 1.6;
            color: var(--text-secondary);
            margin-bottom: 28px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .hero-actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: var(--radius-full);
            font-family: var(--font-body);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-accent {
            background: var(--accent);
            color: var(--bg);
        }

        .btn-accent:hover {
            transform: scale(1.03);
            box-shadow: 0 0 40px var(--accent-glow);
        }

        .btn-outline {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-outline:hover {
            background: var(--bg-card);
            border-color: var(--text-muted);
        }

        /* Hero Progress */
        .hero-progress {
            position: absolute;
            bottom: 40px;
            right: 60px;
            display: flex;
            align-items: center;
            gap: 20px;
            z-index: 10;
        }

        .hero-counter {
            font-family: var(--font-display);
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .hero-counter span {
            color: var(--text);
            font-weight: 600;
        }

        .hero-dots {
            display: flex;
            gap: 6px;
        }

        .hero-dot {
            width: 8px;
            height: 8px;
            background: var(--text-muted);
            border-radius: 50%;
            cursor: pointer;
            transition: var(--transition);
        }

        .hero-dot.active {
            width: 32px;
            border-radius: var(--radius-full);
            background: var(--accent);
        }

        /* Section */
        .section {
            padding: 40px 60px 40px 120px;
        }

        .section:first-of-type {
            padding-top: 50px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 20px;
        }

        .section-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent);
            margin-bottom: 4px;
        }

        .section-title {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -1px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-actions {
            display: flex;
            gap: 8px;
        }

        .scroll-btn {
            width: 40px;
            height: 40px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 50%;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .scroll-btn:hover {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--bg);
        }

        /* Cards Row */
        .cards-row {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            padding-bottom: 10px;
            scroll-behavior: smooth;
            scrollbar-width: none;
            scroll-snap-type: x mandatory;
        }

        .cards-row::-webkit-scrollbar {
            display: none;
        }

        /* Movie Card - No play overlay */
        .card {
            flex-shrink: 0;
            width: 180px;
            cursor: pointer;
            transition: var(--transition);
            scroll-snap-align: start;
        }

        .card-poster {
            position: relative;
            aspect-ratio: 2/3;
            border-radius: var(--radius);
            overflow: hidden;
            margin-bottom: 12px;
            background: var(--bg-card);
        }

        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition);
        }

        .card:hover .card-img {
            transform: scale(1.05);
        }

        .card-rating {
            position: absolute;
            top: 8px;
            left: 8px;
            padding: 3px 7px;
            background: var(--bg);
            border-radius: 6px;
            font-size: 0.65rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 3px;
            color: var(--accent);
        }

        .card-save {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 30px;
            height: 30px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border: none;
            border-radius: 50%;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: var(--transition);
            font-size: 0.75rem;
        }

        .card:hover .card-save {
            opacity: 1;
        }

        .card-save:hover,
        .card-save.saved {
            background: var(--accent);
            color: var(--bg);
            opacity: 1;
        }

        .card-info h3 {
            font-family: var(--font-display);
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* Provider Logo */
        .provider-logo {
            width: 26px;
            height: 26px;
            border-radius: 6px;
            object-fit: cover;
        }

        /* Search */
        .search-section {
            min-height: 100vh;
            padding: 120px 60px 80px 120px;
        }

        .search-header {
            max-width: 600px;
            margin-bottom: 60px;
        }

        .search-title {
            font-family: var(--font-display);
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: -2px;
            margin-bottom: 16px;
        }

        .search-title span {
            color: var(--accent);
        }

        .search-subtitle {
            color: var(--text-muted);
            font-size: 1rem;
        }

        .search-box {
            margin-top: 40px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 18px 24px 18px 55px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-family: var(--font-body);
            font-size: 1rem;
            outline: none;
            transition: var(--transition);
        }

        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-dim);
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        .search-icon {
            position: absolute;
            left: 22px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }

        /* Content Section */
        .content-section {
            min-height: 100vh;
            padding: 120px 60px 80px 120px;
        }

        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .filter {
            padding: 10px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-full);
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
        }

        .filter:hover {
            background: var(--bg-hover);
            color: var(--text);
        }

        .filter.active {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--bg);
        }

        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }

        /* Watchlist */
        .watchlist-section {
            min-height: 100vh;
            padding: 120px 60px 80px 120px;
        }

        .empty {
            text-align: center;
            padding: 100px 20px;
        }

        .empty-icon {
            width: 90px;
            height: 90px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 2rem;
            color: var(--text-muted);
        }

        .empty h2 {
            font-family: var(--font-display);
            font-size: 1.6rem;
            margin-bottom: 12px;
        }

        .empty p {
            color: var(--text-muted);
            margin-bottom: 28px;
        }

        /* Modal */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            display: none;
            overflow-y: auto;
        }

        .modal.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-inner {
            max-width: 1100px;
            margin: 0 auto;
        }

        .modal-close {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 50%;
            cursor: pointer;
            z-index: 2001;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .modal-close:hover {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--bg);
        }

        .modal-hero {
            position: relative;
            height: 60vh;
            min-height: 300px;
        }

        .modal-hero img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
        }

        .modal-hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, var(--bg) 0%, transparent 100%);
        }

        .modal-content {
            padding: 0 40px 50px;
            margin-top: -150px;
            position: relative;
            z-index: 10;
        }

        .modal-title {
            font-family: var(--font-display);
            font-size: clamp(1.8rem, 5vw, 3rem);
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 16px;
        }

        .modal-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 16px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .modal-meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .modal-meta-item.rating {
            color: var(--accent);
            font-weight: 600;
        }

        .modal-genres {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }

        .modal-genre {
            padding: 6px 14px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-full);
            font-size: 0.8rem;
        }

        .modal-desc {
            font-size: 1rem;
            line-height: 1.7;
            color: var(--text-secondary);
            margin-bottom: 28px;
            max-width: 700px;
            display: -webkit-box;
            -webkit-line-clamp: 5;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 50px;
        }

        /* Episodes */
        .season-select {
            margin-bottom: 20px;
        }

        .season-label {
            font-family: var(--font-display);
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .season-dropdown {
            padding: 12px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-family: var(--font-body);
            font-size: 0.95rem;
            cursor: pointer;
            outline: none;
            min-width: 160px;
        }

        .episodes-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .episode {
            display: flex;
            gap: 16px;
            padding: 14px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            cursor: pointer;
            transition: var(--transition);
            align-items: center;
        }

        .episode:hover {
            background: var(--bg-hover);
            border-color: var(--accent);
        }

        .episode-thumb {
            position: relative;
            flex-shrink: 0;
            width: 160px;
            aspect-ratio: 16/9;
            border-radius: var(--radius-sm);
            overflow: hidden;
            background: var(--bg-hover);
        }

        .episode-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .episode-thumb-play {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: var(--transition);
        }

        .episode:hover .episode-thumb-play {
            opacity: 1;
        }

        .episode-thumb-play i {
            width: 36px;
            height: 36px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--bg);
            font-size: 0.8rem;
        }

        .episode-info {
            flex: 1;
            min-width: 0;
        }

        .episode-num {
            font-size: 0.75rem;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 4px;
        }

        .episode-title {
            font-family: var(--font-display);
            font-weight: 500;
            margin-bottom: 6px;
            font-size: 0.95rem;
        }

        .episode-desc {
            font-size: 0.8rem;
            color: var(--text-muted);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.5;
        }

        .episode-time {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 6px;
        }

        /* Player */
        .player {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 3000;
            display: none;
        }

        .player.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .player-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            cursor: pointer;
            z-index: 3001;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .player-close:hover {
            background: var(--accent);
            color: var(--bg);
        }

        .player iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Loading */
        .loading {
            display: flex;
            justify-content: center;
            padding: 40px;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }

        /* Mobile Nav */

            display: none;

            bottom: 0;
            left: 0;
            width: 100%;

            text-transform: uppercase;

        }

        /* Tablet */
        @media (max-width: 1024px) {
            .nav {
                display: none;

            .mobile-nav {
                display: flex;

            .section,
            .search-section,

            .watchlist-section {
                padding-left: 30px;

        /* Mobile */
        @media (max-width: 768px) {
            .main {
                padding-bottom: 64px;

            /* Hero - Better mobile scaling */
            .hero {
                height: 70vh;
                min-height: 500px;
            }

            .hero-img {

            .hero-overlay {
                background: 
                    linear-gradient(to top, var(--bg) 0%, var(--bg) 15%, transparent 60%),
                    linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, transparent 40%);
            }

            .hero-content {
                padding: 0 16px 24px;
                max-width: 100%;
            }

            .hero-label {

            .hero-title {

            .hero-actions {
                gap: 8px;

            .btn {
                padding: 10px 18px;

            .hero-progress {
                position: absolute;
                bottom: auto;
                top: 16px;

            /* Sections */

            .scroll-btn {

            /* Cards - 3 across on mobile */

            .card-meta {

            /* Search */
            .search-section {

            }

            .search-title {

            .search-subtitle {

                gap: 8px;

            /* Content section */

                font-size: 0.65rem;

                font-size: 0.85rem;
                margin-bottom: 20px;
                -webkit-line-clamp: 4;

            /* Episodes */

            /* Toast */
            .toast-container {
                bottom: 80px;

                right: 12px;
                transform: none;

            .toast {
                width: 100%;
                padding: 12px 16px;

        /* Small Mobile */
        @media (max-width: 380px) {
            .hero {
                height: 65vh;
                min-height: 450px;
            }

            .hero-title {
                font-size: 1.5rem;
            }

            .hero-desc {
                -webkit-line-clamp: 2;
            }

            .card {
                width: calc((100vw - 36px) / 3);
                min-width: 85px;
            }

                font-size: 0.65rem;
            }

<body>
    <div class="cursor-glow" id="cursorGlow"></div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Desktop Nav -->
    <nav class="nav">
        <div class="nav-item active" data-page="discover" data-tooltip="Discover" onclick="go('discover')">
            <i class="fas fa-compass"></i>
        </div>
        <div class="nav-item" data-page="movies" data-tooltip="Movies" onclick="go('movies')">
            <i class="fas fa-film"></i>
        </div>
        <div class="nav-item" data-page="tv" data-tooltip="TV Shows" onclick="go('tv')">
            <i class="fas fa-tv"></i>
        </div>
        <div class="nav-item" data-page="search" data-tooltip="Search" onclick="go('search')">
            <i class="fas fa-search"></i>
        </div>
        <div class="nav-item" data-page="watchlist" data-tooltip="My List" onclick="go('watchlist')">
            <i class="fas fa-bookmark"></i>
        </div>
    </nav>

    <!-- Mobile Nav -->
    <nav class="mobile-nav">
        <div class="mobile-nav-item active" data-page="discover" onclick="go('discover')">
            <i class="fas fa-compass"></i>
            <span>Discover</span>
        </div>
        <div class="mobile-nav-item" data-page="movies" onclick="go('movies')">
            <i class="fas fa-film"></i>
            <span>Movies</span>
        </div>
        <div class="mobile-nav-item" data-page="tv" onclick="go('tv')">
            <i class="fas fa-tv"></i>
            <span>TV</span>
        </div>
        <div class="mobile-nav-item" data-page="search" onclick="go('search')">
            <i class="fas fa-search"></i>
            <span>Search</span>
        </div>
        <div class="mobile-nav-item" data-page="watchlist" onclick="go('watchlist')">
            <i class="fas fa-bookmark"></i>
            <span>List</span>
        </div>
    </nav>

    <!-- Main -->
    <main class="main" id="main"></main>

    <!-- Modal -->
    <div class="modal" id="modal">
        <div class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></div>
        <div class="modal-inner" id="modalInner"></div>
    </div>

    <!-- Player -->
    <div class="player" id="player">
        <div class="player-close" onclick="closePlayer()"><i class="fas fa-times"></i></div>
        <iframe id="playerFrame" allowfullscreen></iframe>
    </div>

    <script>
        const API = 'https://api.themoviedb.org/3';
        const KEY = '2f4038e83265214a0dcd6ec2eb3276f5';
        const IMG = 'https://image.tmdb.org/t/p';
        const EMBED = 'https://vidlink.pro';

        const isMobile = () => window.innerWidth <= 768;
        const getBackdropSize = () => isMobile() ? '/w780' : '/original';
        const getPosterSize = () => isMobile() ? '/w342' : '/w500';

        const PROVIDERS = {
            netflix: { id: 8, name: 'Netflix', logo: '/t2yyOv40HZeVlLjYsCsPHnWLk4W.jpg' },
            amazon: { id: 9, name: 'Prime Video', logo: '/emthp39XA2YScoYL1p0sdbAH2WA.jpg' },
            disney: { id: 337, name: 'Disney+', logo: '/7rwgEs15tFwyR9NPQ5vpzxTj19Q.jpg' },
            apple: { id: 350, name: 'Apple TV+', logo: '/6uhKBfmtzFqOcLousHwZuzcrScK.jpg' },
            hulu: { id: 15, name: 'Hulu', logo: '/zxrVdFjIjLqkfnwyghnfywTn3Lh.jpg' },
            hbo: { id: 1825, name: 'Max', logo: '/Ajqyt5aNxNGjmF9uOfxArGrdf3X.jpg' }
        };

        let heroIdx = 0, heroItems = [], heroTimer;
        let list = JSON.parse(localStorage.getItem('kino_list')) || [];
        let currentPage = 'discover';
        let contentType = 'movie';
        let items = [];
        let page = 1;
        let genre = 'all';
        let isLoading = false;
        let scrollHandler = null;

        document.addEventListener('mousemove', e => {
            const glow = document.getElementById('cursorGlow');
            if (glow) {
                glow.style.left = e.clientX + 'px';
                glow.style.top = e.clientY + 'px';
            }
        });

        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <i class="fas fa-${type === 'success' ? 'check-circle' : 'trash'}"></i>
                <span>${message}</span>
            `;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        async function api(path, params = {}) {
            const url = new URL(`${API}${path}`);
            url.searchParams.append('api_key', KEY);
            Object.entries(params).forEach(([k, v]) => url.searchParams.append(k, v));
            return (await fetch(url)).json();
        }

        function go(p) {
            currentPage = p;
            document.querySelectorAll('.nav-item, .mobile-nav-item').forEach(n => {
                n.classList.toggle('active', n.dataset.page === p);
            });
            clearInterval(heroTimer);
            
            if (scrollHandler) {
                window.removeEventListener('scroll', scrollHandler);
                scrollHandler = null;
            }
            
            window.scrollTo(0, 0);

            if (p === 'discover') loadDiscover();
            else if (p === 'movies') loadContent('movie');
            else if (p === 'tv') loadContent('tv');
            else if (p === 'search') loadSearch();
            else if (p === 'watchlist') loadWatchlist();
        }

        async function loadDiscover() {
            const main = document.getElementById('main');
            main.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

            const [trending, popular, topRated, tvPop] = await Promise.all([
                api('/trending/movie/week'),
                api('/movie/popular'),
                api('/movie/top_rated'),
                api('/tv/popular')
            ]);

            heroItems = trending.results.filter(m => m.backdrop_path).slice(0, 5);

            main.innerHTML = `
                <section class="hero">
                    <div class="hero-media">
                        ${heroItems.map((m, i) => `
                            <div class="hero-slide ${i === 0 ? 'active' : ''}">
                                <img class="hero-img" src="${IMG}${getBackdropSize()}${m.backdrop_path}" alt="">
                                <div class="hero-overlay"></div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="hero-content" id="heroContent">${heroHTML(heroItems[0])}</div>
                    <div class="hero-progress">
                        <div class="hero-counter"><span>01</span> / 05</div>
                        <div class="hero-dots">
                            ${heroItems.map((_, i) => `<div class="hero-dot ${i === 0 ? 'active' : ''}" onclick="goSlide(${i})"></div>`).join('')}
                        </div>
                    </div>
                </section>

                <section class="section">
                    <div class="section-header">
                        <div>
                            <div class="section-label">Trending</div>
                            <h2 class="section-title">Popular Movies</h2>
                        </div>
                        <div class="section-actions">
                            <button class="scroll-btn" onclick="scrollRow('popular', -1)"><i class="fas fa-chevron-left"></i></button>
                            <button class="scroll-btn" onclick="scrollRow('popular', 1)"><i class="fas fa-chevron-right"></i></button>
                        </div>
                    </div>
                    <div class="cards-row" id="popular">${renderCards(popular.results, 'movie')}</div>
                </section>

                <section class="section">
                    <div class="section-header">
                        <div>
                            <div class="section-label">Curated</div>
                            <h2 class="section-title">Top Rated</h2>
                        </div>
                        <div class="section-actions">
                            <button class="scroll-btn" onclick="scrollRow('toprated', -1)"><i class="fas fa-chevron-left"></i></button>
                            <button class="scroll-btn" onclick="scrollRow('toprated', 1)"><i class="fas fa-chevron-right"></i></button>
                        </div>
                    </div>
                    <div class="cards-row" id="toprated">${renderCards(topRated.results, 'movie')}</div>
                </section>

                <section class="section">
                    <div class="section-header">
                        <div>
                            <div class="section-label">Series</div>
                            <h2 class="section-title">Popular TV Shows</h2>
                        </div>
                        <div class="section-actions">
                            <button class="scroll-btn" onclick="scrollRow('tvpop', -1)"><i class="fas fa-chevron-left"></i></button>
                            <button class="scroll-btn" onclick="scrollRow('tvpop', 1)"><i class="fas fa-chevron-right"></i></button>
                        </div>
                    </div>
                    <div class="cards-row" id="tvpop">${renderCards(tvPop.results, 'tv')}</div>
                </section>

                ${Object.entries(PROVIDERS).map(([key, provider]) => `
                    <section class="section" id="provider-${key}">
                        <div class="section-header">
                            <div>
                                <div class="section-label">Streaming</div>
                                <h2 class="section-title">
                                    <img class="provider-logo" src="${IMG}/w92${provider.logo}" alt="${provider.name}">
                                    ${provider.name}
                                </h2>
                            </div>
                            <div class="section-actions">
                                <button class="scroll-btn" onclick="scrollRow('${key}-row', -1)"><i class="fas fa-chevron-left"></i></button>
                                <button class="scroll-btn" onclick="scrollRow('${key}-row', 1)"><i class="fas fa-chevron-right"></i></button>
                            </div>
                        </div>
                        <div class="cards-row" id="${key}-row">
                            <div class="loading"><div class="spinner"></div></div>
                        </div>
                    </section>
                `).join('')}
            `;

            startHero();
            loadProviderContent();
        }

        async function loadProviderContent() {
            for (const [key, provider] of Object.entries(PROVIDERS)) {
                try {
                    const data = await api('/discover/movie', {
                        with_watch_providers: provider.id,
                        watch_region: 'US',
                        sort_by: 'popularity.desc'
                    });
                    
                    const container = document.getElementById(`${key}-row`);
                    if (container) {
                        const filtered = data.results.filter(m => m.poster_path).slice(0, 20);
                        container.innerHTML = renderCards(filtered, 'movie');
                    }
                } catch (error) {
                    console.error(`Error loading ${provider.name} content:`, error);
                }
            }
        }

        function heroHTML(m) {
            return `
                <div class="hero-label"><i class="fas fa-fire"></i> Trending</div>
                <h1 class="hero-title">${m.title}</h1>
                <div class="hero-meta">
                    <span class="hero-rating"><i class="fas fa-star"></i> ${m.vote_average?.toFixed(1)}</span>
                    <span class="hero-meta-item">${m.release_date?.substring(0, 4)}</span>
                    <span class="hero-meta-item">${(m.vote_count / 1000).toFixed(1)}k</span>
                </div>
                <p class="hero-desc">${m.overview}</p>
                <div class="hero-actions">
                    <button class="btn btn-accent" onclick="openDetail('movie', ${m.id})">
                        <i class="fas fa-play"></i> Watch
                    </button>
                    <button class="btn btn-outline" id="heroListBtn" onclick="toggleList('movie', ${m.id}, '${m.title.replace(/'/g, "\\'")}', '${m.poster_path}')">
                        <i class="fas fa-${inList(m.id) ? 'check' : 'plus'}"></i> List
                    </button>
                </div>
            `;
        }

        function startHero() {
            heroTimer = setInterval(() => {
                heroIdx = (heroIdx + 1) % heroItems.length;
                updateHero();
            }, 7000);
        }

        function goSlide(i) {
            heroIdx = i;
            updateHero();
            clearInterval(heroTimer);
            startHero();
        }

        function updateHero() {
            document.querySelectorAll('.hero-slide').forEach((s, i) => s.classList.toggle('active', i === heroIdx));
            document.querySelectorAll('.hero-dot').forEach((d, i) => d.classList.toggle('active', i === heroIdx));
            const counter = document.querySelector('.hero-counter span');
            if (counter) counter.textContent = String(heroIdx + 1).padStart(2, '0');
            const heroContent = document.getElementById('heroContent');
            if (heroContent) heroContent.innerHTML = heroHTML(heroItems[heroIdx]);
        }

        function scrollRow(id, dir) {
            const row = document.getElementById(id);
            if (row) {
                const scrollAmount = isMobile() ? row.offsetWidth * 0.85 : 400;
                row.scrollBy({ left: dir * scrollAmount, behavior: 'smooth' });
            }
        }

        async function loadContent(type) {
            contentType = type;
            items = [];
            page = 1;
            genre = 'all';
            isLoading = false;

            const genres = await api(`/genre/${type}/list`);
            const main = document.getElementById('main');

            main.innerHTML = `
                <section class="content-section">
                    <div class="section-header">
                        <h2 class="section-title">${type === 'movie' ? 'Movies' : 'TV Shows'}</h2>
                    </div>
                    <div class="filters" id="filters">
                        <div class="filter active" data-id="all" onclick="setGenre('all')">All</div>
                        ${genres.genres.slice(0, 8).map(g => `
                            <div class="filter" data-id="${g.id}" onclick="setGenre(${g.id})">${g.name}</div>
                        `).join('')}
                    </div>
                    <div class="content-grid" id="grid"></div>
                    <div class="loading" id="loader"><div class="spinner"></div></div>
                </section>
            `;

            await loadMore();
            setupInfiniteScroll();
        }

        async function setGenre(id) {
            genre = id;
            items = [];
            page = 1;
            isLoading = false;
            
            document.querySelectorAll('.filter').forEach(f => f.classList.toggle('active', f.dataset.id == id));
            
            const grid = document.getElementById('grid');
            if (grid) grid.innerHTML = '';
            
            const loader = document.getElementById('loader');
            if (loader) loader.style.display = 'flex';
            
            await loadMore();
        }

        async function loadMore() {
            if (items.length >= 100 || isLoading) return;
            
            isLoading = true;
            
            const params = { page };
            if (genre !== 'all') params.with_genres = genre;
            
            try {
                const data = await api(`/discover/${contentType}`, params);
                const filtered = data.results.filter(m => m.poster_path);
                const toAdd = filtered.slice(0, Math.min(filtered.length, 100 - items.length));
                
                items = [...items, ...toAdd];
                
                const grid = document.getElementById('grid');
                if (grid) {
                    grid.innerHTML += renderCards(toAdd, contentType);
                }
                
                if (items.length >= 100) {
                    const loader = document.getElementById('loader');
                    if (loader) loader.style.display = 'none';
                }
                
                page++;
            } catch (error) {
                console.error('Error loading content:', error);
            }
            
            isLoading = false;
        }

        function setupInfiniteScroll() {
            if (scrollHandler) {
                window.removeEventListener('scroll', scrollHandler);
            }
            
            scrollHandler = async () => {
                if (currentPage !== 'movies' && currentPage !== 'tv') return;
                if (isLoading || items.length >= 200) return;
                
                const scrollTop = window.scrollY;
                const windowHeight = window.innerHeight;
                const docHeight = document.documentElement.scrollHeight;
                
                if (scrollTop + windowHeight >= docHeight - 400) {
                    await loadMore();
                }
            };
            
            window.addEventListener('scroll', scrollHandler);
        }

        function loadSearch() {
            document.getElementById('main').innerHTML = `
                <section class="search-section">
                    <div class="search-header">
                        <h1 class="search-title">Search<span>.</span></h1>
                        <p class="search-subtitle">Find movies and TV shows</p>
                        <div class="search-box">
                            <i class="fas fa-search search-icon"></i>
                            <input class="search-input" id="searchInput" placeholder="Type to search..." onkeyup="handleSearch(event)">
                        </div>
                    </div>
                    <div class="results-grid" id="results"></div>
                </section>
            `;
            document.getElementById('searchInput').focus();
        }

        let searchTimer;
        function handleSearch(e) {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(() => doSearch(e.target.value), 400);
        }

        async function doSearch(q) {
            const results = document.getElementById('results');
            if (!q.trim()) { results.innerHTML = ''; return; }
            results.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
            const data = await api('/search/multi', { query: q });
            const filtered = data.results.filter(i => (i.media_type === 'movie' || i.media_type === 'tv') && i.poster_path);
            results.innerHTML = filtered.length
                ? renderCards(filtered.map(i => ({ ...i, type: i.media_type })), null)
                : '<p style="color:var(--text-muted);grid-column:1/-1;text-align:center;">No results found</p>';
        }

        function loadWatchlist() {
            const main = document.getElementById('main');
            if (!list.length) {
                main.innerHTML = `
                    <section class="watchlist-section">
                        <div class="empty">
                            <div class="empty-icon"><i class="fas fa-bookmark"></i></div>
                            <h2>Your list is empty</h2>
                            <p>Save movies and shows to watch later</p>
                            <button class="btn btn-accent" onclick="go('discover')">
                                <i class="fas fa-compass"></i> Discover
                            </button>
                        </div>
                    </section>
                `;
                return;
            }

            main.innerHTML = `
                <section class="watchlist-section">
                    <div class="section-header">
                        <h2 class="section-title">My List</h2>
                    </div>
                    <div class="content-grid" id="watchlistGrid">
                        ${list.map(i => `
                            <div class="card" data-id="${i.id}" onclick="openDetail('${i.type}', ${i.id})">
                                <div class="card-poster">
                                    <img class="card-img" src="${IMG}${getPosterSize()}${i.poster}" alt="${i.title}" loading="lazy">
                                    <button class="card-save saved" onclick="event.stopPropagation(); toggleList('${i.type}', ${i.id}, '${i.title.replace(/'/g, "\\'")}', '${i.poster}')">
                                        <i class="fas fa-check"></i>
                                    </button>
                                </div>
                                <div class="card-info">
                                    <h3>${i.title}</h3>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </section>
            `;
        }

        function inList(id) { 
            return list.some(i => i.id === id); 
        }

        function toggleList(type, id, title, poster) {
            const idx = list.findIndex(i => i.id === id);
            
            if (idx > -1) {
                list.splice(idx, 1);
                showToast(`Removed "${title}"`, 'remove');
            } else {
                list.push({ type, id, title, poster });
                showToast(`Added "${title}"`, 'success');
            }
            
            localStorage.setItem('kino_list', JSON.stringify(list));
            updateSaveButtons(id);
            
            if (currentPage === 'watchlist') {
                loadWatchlist();
            }
        }

        function updateSaveButtons(id) {
            const saved = inList(id);
            
            document.querySelectorAll(`.card-save`).forEach(btn => {
                const card = btn.closest('.card');
                if (card) {
                    const cardId = parseInt(card.dataset.id || card.getAttribute('onclick')?.match(/\d+/)?.[0]);
                    if (cardId === id) {
                        btn.classList.toggle('saved', saved);
                        btn.innerHTML = `<i class="fas fa-${saved ? 'check' : 'plus'}"></i>`;
                    }
                }
            });
            
            const heroBtn = document.getElementById('heroListBtn');
            if (heroBtn && heroItems[heroIdx]?.id === id) {
                heroBtn.innerHTML = `<i class="fas fa-${saved ? 'check' : 'plus'}"></i> List`;
            }
            
            const modalListBtn = document.getElementById('modalListBtn');
            if (modalListBtn) {
                const modalId = parseInt(modalListBtn.dataset.id);
                if (modalId === id) {
                    modalListBtn.innerHTML = `<i class="fas fa-${saved ? 'check' : 'plus'}"></i> ${saved ? 'In List' : 'Add to List'}`;
                }
            }
        }

        // Cards - No play overlay
        function renderCards(arr, type) {
            const posterSize = getPosterSize();
            return arr.filter(m => m.poster_path).slice(0, 20).map(m => {
                const t = type || m.media_type || m.type;
                return `
                    <div class="card" data-id="${m.id}" onclick="openDetail('${t}', ${m.id})">
                        <div class="card-poster">
                            <img class="card-img" src="${IMG}${posterSize}${m.poster_path}" alt="${m.title || m.name}" loading="lazy">
                            <span class="card-rating"><i class="fas fa-star"></i> ${m.vote_average?.toFixed(1)}</span>
                            <button class="card-save ${inList(m.id) ? 'saved' : ''}" onclick="event.stopPropagation(); toggleList('${t}', ${m.id}, '${(m.title || m.name).replace(/'/g, "\\'")}', '${m.poster_path}')">
                                <i class="fas fa-${inList(m.id) ? 'check' : 'plus'}"></i>
                            </button>
                        </div>
                        <div class="card-info">
                            <h3>${m.title || m.name}</h3>
                            <div class="card-meta">${(m.release_date || m.first_air_date || '').substring(0, 4)}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function openDetail(type, id) {
            const modal = document.getElementById('modal');
            const inner = document.getElementById('modalInner');
            modal.classList.add('active');
            inner.innerHTML = '<div class="loading" style="height:100vh;"><div class="spinner"></div></div>';
            document.body.style.overflow = 'hidden';

            const data = await api(`/${type}/${id}`);
            const backdropSize = getBackdropSize();

            let html = `
                <div class="modal-hero">
                    <img src="${IMG}${backdropSize}${data.backdrop_path || data.poster_path}" alt="">
                    <div class="modal-hero-overlay"></div>
                </div>
                <div class="modal-content">
                    <h1 class="modal-title">${data.title || data.name}</h1>
                    <div class="modal-meta">
                        <span class="modal-meta-item rating"><i class="fas fa-star"></i> ${data.vote_average?.toFixed(1)}</span>
                        <span class="modal-meta-item"><i class="fas fa-calendar"></i> ${(data.release_date || data.first_air_date || '').substring(0, 4)}</span>
                        ${type === 'movie'
                            ? `<span class="modal-meta-item"><i class="fas fa-clock"></i> ${data.runtime} min</span>`
                            : `<span class="modal-meta-item"><i class="fas fa-tv"></i> ${data.number_of_seasons} Season${data.number_of_seasons > 1 ? 's' : ''}</span>`
                        }
                    </div>
                    <div class="modal-genres">
                        ${(data.genres || []).map(g => `<span class="modal-genre">${g.name}</span>`).join('')}
                    </div>
                    <p class="modal-desc">${data.overview || 'No description available.'}</p>
                    <div class="modal-actions">
                        ${type === 'movie' ? `
                            <button class="btn btn-accent" onclick="playMovie(${id})">
                                <i class="fas fa-play"></i> Play
                            </button>
                        ` : ''}
                        <button class="btn btn-outline" id="modalListBtn" data-id="${id}" onclick="toggleList('${type}', ${id}, '${(data.title || data.name).replace(/'/g, "\\'")}', '${data.poster_path}')">
                            <i class="fas fa-${inList(id) ? 'check' : 'plus'}"></i> ${inList(id) ? 'In List' : 'Add to List'}
                        </button>
                    </div>
            `;

            if (type === 'tv') {
                html += `
                    <div class="season-select">
                        <div class="season-label">Season</div>
                        <select class="season-dropdown" id="seasonSelect" onchange="loadSeason(${id}, this.value)">
                            ${Array.from({ length: data.number_of_seasons }, (_, i) => i + 1).map(s => `<option value="${s}">Season ${s}</option>`).join('')}
                        </select>
                    </div>
                    <div class="episodes-list" id="episodes"><div class="loading"><div class="spinner"></div></div></div>
                `;
            }

            html += '</div>';
            inner.innerHTML = html;

            if (type === 'tv') loadSeason(id, 1);
        }

        async function loadSeason(tvId, season) {
            const container = document.getElementById('episodes');
            container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
            const data = await api(`/tv/${tvId}/season/${season}`);

            container.innerHTML = data.episodes.map(ep => `
                <div class="episode" onclick="playEp(${tvId}, ${season}, ${ep.episode_number})">
                    <div class="episode-thumb">
                        <img src="${ep.still_path ? IMG + '/w300' + ep.still_path : 'https://via.placeholder.com/160x90/111/333?text=No+Image'}" alt="" loading="lazy">
                        <div class="episode-thumb-play"><i class="fas fa-play"></i></div>
                    </div>
                    <div class="episode-info">
                        <div class="episode-num">Episode ${ep.episode_number}</div>
                        <div class="episode-title">${ep.name}</div>
                        <p class="episode-desc">${ep.overview || 'No description available.'}</p>
                        ${ep.runtime ? `<div class="episode-time"><i class="fas fa-clock"></i> ${ep.runtime} min</div>` : ''}
                    </div>
                </div>
            `).join('');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            document.body.style.overflow = '';
        }

        function playMovie(id) {
            document.getElementById('playerFrame').src = `${EMBED}/movie/${id}`;
            document.getElementById('player').classList.add('active');
        }

        function playEp(tvId, season, ep) {
            document.getElementById('playerFrame').src = `${EMBED}/tv/${tvId}/${season}/${ep}`;
            document.getElementById('player').classList.add('active');
        }

        function closePlayer() {
            document.getElementById('player').classList.remove('active');
            document.getElementById('playerFrame').src = '';
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') {
                if (document.getElementById('player').classList.contains('active')) closePlayer();
                else if (document.getElementById('modal').classList.contains('active')) closeModal();
            }
        });

        go('discover');
    </script>
</body>
</html>
