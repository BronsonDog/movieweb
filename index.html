<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>StreamFlix - Movies & TV Shows</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            scroll-behavior: auto;
        }

        body {
            background-color: #ffffff;
            color: #2d3748;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            -webkit-overflow-scrolling: touch;
        }

        /* Performance optimizations */
        .content-grid {
            contain: layout style;
        }

        .media-card {
            contain: layout style paint;
            content-visibility: auto;
            contain-intrinsic-size: 0 250px;
        }

        /* Smooth scrolling containers */
        .scroll-container {
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-x: contain;
        }

        /* Hide scrollbar */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Header */
        .header-blur {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        /* Details screen - FADE IN/OUT */
        .details-screen {
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        
        .details-screen.active {
            opacity: 1;
            visibility: visible;
        }

        /* Details content animation */
        .details-screen .details-inner {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.4s ease 0.1s, transform 0.4s ease 0.1s;
        }

        .details-screen.active .details-inner {
            opacity: 1;
            transform: translateY(0);
        }

        /* Simple fade animation */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .fade-in {
            animation: fadeIn 0.3s ease-out;
        }

        /* Card styles */
        .card-hover {
            transition: transform 0.15s ease-out, box-shadow 0.15s ease-out;
        }

        @media (hover: hover) {
            .card-hover:hover {
                transform: scale(1.03);
                box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
            }
        }

        .card-hover:active {
            transform: scale(0.98);
        }

        /* Episode card */
        .episode-card:active {
            transform: scale(0.96);
            transition: transform 0.1s;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: calc(20px + env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background-color: #1a1a1a;
            color: white;
            padding: 14px 24px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            z-index: 9999;
            opacity: 0;
            transition: transform 0.25s cubic-bezier(0.32, 0.72, 0, 1), opacity 0.25s;
            max-width: calc(100% - 32px);
            text-align: center;
            font-weight: 500;
        }
        
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        
        .toast.success { background-color: #10b981; }
        .toast.error { background-color: #ef4444; }

        /* Skeleton */
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.2s infinite;
        }
        
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Season dropdown */
        .season-dropdown {
            background-color: rgba(255, 255, 255, 0.15);
            color: #ffffff;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.25);
        }
        
        .season-dropdown option {
            background-color: #1a1a1a;
            color: #ffffff;
        }

        /* Mobile navigation */
        .mobile-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(0, 0, 0, 0.08);
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 40;
        }

        @media (min-width: 768px) {
            .mobile-only { display: none !important; }
        }

        @media (max-width: 767px) {
            .desktop-only { display: none !important; }
        }

        /* Search overlay */
        .search-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 45;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s, visibility 0.2s;
        }

        .search-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        /* Search panel */
        .search-panel-mobile {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: white;
            z-index: 50;
            transform: translateY(-100%);
            transition: transform 0.25s cubic-bezier(0.32, 0.72, 0, 1);
            padding: 16px;
            padding-top: calc(16px + env(safe-area-inset-top));
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .search-panel-mobile.active {
            transform: translateY(0);
        }

        /* Back to top */
        .back-to-top {
            position: fixed;
            bottom: calc(80px + env(safe-area-inset-bottom));
            right: 16px;
            width: 44px;
            height: 44px;
            background: #ef4444;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.35);
            z-index: 30;
            opacity: 0;
            visibility: hidden;
            transform: scale(0.8);
            transition: all 0.2s ease-out;
        }

        .back-to-top.visible {
            opacity: 1;
            visibility: visible;
            transform: scale(1);
        }

        /* Horizontal scroll shelf */
        .shelf-scroll {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            padding: 4px 0 16px;
        }

        .shelf-scroll > * {
            scroll-snap-align: start;
            flex-shrink: 0;
        }

        .shelf-card {
            width: 130px;
        }

        @media (min-width: 640px) {
            .shelf-card {
                width: 150px;
            }
        }

        /* Section header */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .see-all-btn {
            color: #ef4444;
            font-weight: 600;
            font-size: 14px;
            padding: 4px 8px;
            border-radius: 6px;
            transition: background 0.15s;
        }

        .see-all-btn:active {
            background: rgba(239, 68, 68, 0.1);
        }

        /* Safe area */
        .safe-area-x {
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
        }

        /* No select */
        .no-select {
            -webkit-user-select: none;
            user-select: none;
        }

        /* Spinner */
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #ef4444;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Image placeholder */
        .img-placeholder {
            background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
        }

        /* Close button hover */
        .close-btn {
            transition: background-color 0.2s, transform 0.2s;
        }

        .close-btn:hover {
            background-color: rgba(0, 0, 0, 0.7);
        }

        .close-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>

            openSearchMobile: $('openSearchMobile'),
            closeSearchMobile: $('closeSearchMobile'),
            navHome: $('navHome'),
            navMovies: $('navMovies'),
            navTV: $('navTV'),
            navSearch: $('navSearch'),
            
            // Details
            detailsScreen: $('detailsScreen'),
            detailsContent: $('detailsContent'),
            closeDetails: $('closeDetails'),
            backdropImage: $('backdropImage'),
            detailsTitle: $('detailsTitle'),
            detailsYear: $('detailsYear'),
            detailsRating: $('detailsRating'),
            detailsRuntime: $('detailsRuntime'),
            detailsGenres: $('detailsGenres'),
            detailsOverview: $('detailsOverview'),
            movieActions: $('movieActions'),
            watchNowBtn: $('watchNowBtn'),
            castSection: $('castSection'),
            castContainer: $('castContainer'),
            tvShowActions: $('tvShowActions'),
            seasonDropdown: $('seasonDropdown'),
            episodesContainer: $('episodesContainer'),
            
            // Other
            homeButton: $('homeButton'),
            retryButton: $('retryButton'),
            toast: $('toast'),
            toastMessage: $('toastMessage'),
            backToTop: $('backToTop')
        };

        // ==========================================
        // UTILITY FUNCTIONS
        // ==========================================
        const utils = {
            showToast(message, type = 'error') {
                elements.toastMessage.textContent = message;
                elements.toast.className = `toast ${type} show`;
                setTimeout(() => elements.toast.classList.remove('show'), 2500);
            },

            debounce(func, delay) {
                return (...args) => {
                    clearTimeout(state.searchDebounce);
                    state.searchDebounce = setTimeout(() => func(...args), delay);
                };
            },

            createSkeletons(count) {
                return Array(count).fill('').map(() => `
                    <div class="skeleton rounded-lg overflow-hidden">
                        <div class="pb-[150%]"></div>
                    </div>
                `).join('');
            },

            createShelfSkeletons(count) {
                return Array(count).fill('').map(() => `
                    <div class="shelf-card skeleton rounded-lg">
                        <div class="pb-[150%]"></div>
                    </div>
                `).join('');
            },

            updateMobileNav(active) {
                [elements.navHome, elements.navMovies, elements.navTV, elements.navSearch].forEach(item => {
                    item.classList.remove('text-red-600');
                    item.classList.add('text-gray-400');
                });
                if (active) {
                    active.classList.remove('text-gray-400');
                    active.classList.add('text-red-600');
                }
            },

            // Instant scroll to top (no animation for faster UX)
            scrollToTop() {
                window.scrollTo(0, 0);
            },

            // Smooth scroll for back to top button
            smoothScrollToTop() {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        };

        // ==========================================
        // API FUNCTIONS
        // ==========================================
        const api = {
            async fetch(endpoint, params = {}) {
                const url = new URL(`${CONFIG.BASE_URL}${endpoint}`);
                url.searchParams.append('api_key', CONFIG.API_KEY);
                url.searchParams.append('language', 'en-US');
                
                Object.entries(params).forEach(([key, value]) => {
                    if (value != null) url.searchParams.append(key, value);
                });

                const response = await fetch(url.toString());
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return response.json();
            },

            getTrending: (type) => api.fetch(`/trending/${type}/week`),
            getPopular: (type, page = 1) => api.fetch(`/${type}/popular`, { page }),
            getTopRated: (type, page = 1) => api.fetch(`/${type}/top_rated`, { page }),
            search: (type, query, page = 1) => api.fetch(`/search/${type}`, { query, page }),
            getDetails: (type, id) => api.fetch(`/${type}/${id}`),
            getCredits: (type, id) => api.fetch(`/${type}/${id}/credits`),
            getSeason: (showId, seasonNumber) => api.fetch(`/tv/${showId}/season/${seasonNumber}`)
        };

        // ==========================================
        // RENDER FUNCTIONS
        // ==========================================
        const render = {
            shelfCard(item, type) {
                if (!item.poster_path) return '';
                
                const title = type === 'movie' ? item.title : item.name;
                const rating = item.vote_average?.toFixed(1) || '';
                
                return `
                    <div class="shelf-card card-hover cursor-pointer no-select" data-id="${item.id}" data-type="${type}">
                        <div class="rounded-lg overflow-hidden shadow-md bg-gray-100">
                            <div class="relative pb-[150%]">
                                <img 
                                    src="${CONFIG.IMAGE_SMALL_URL}${item.poster_path}" 
                                    alt="${title}" 
                                    class="absolute inset-0 w-full h-full object-cover"
                                    loading="lazy"
                                >
                                ${rating ? `
                                    <div class="absolute top-1 right-1 bg-black/70 text-white text-[10px] font-bold px-1.5 py-0.5 rounded flex items-center gap-0.5">
                                        <i class="fas fa-star text-yellow-500" style="font-size: 8px;"></i>
                                        ${rating}
                                    </div>
                                ` : ''}
                            </div>
                            <div class="p-1.5">
                                <h3 class="font-medium text-xs text-gray-800 truncate">${title}</h3>
                            </div>
                        </div>
                    </div>
                `;
            },

            shelf(container, items, type) {
                container.innerHTML = items
                    .filter(item => item.poster_path)
                    .slice(0, 15)
                    .map(item => this.shelfCard(item, type))
                    .join('');
            },

            gridCard(item, index) {
                if (!item.poster_path) return '';
                
                const title = state.currentType === 'movie' ? item.title : item.name;
                const releaseDate = state.currentType === 'movie' ? item.release_date : item.first_air_date;
                const year = releaseDate?.split('-')[0] || '';
                const rating = item.vote_average?.toFixed(1) || '';

                return `
                    <div class="media-card fade-in cursor-pointer card-hover no-select" 
                         data-id="${item.id}" 
                         data-type="${state.currentType}"
                         style="animation-delay: ${Math.min(index * 0.02, 0.3)}s">
                        <div class="rounded-lg overflow-hidden shadow-md bg-gray-100">
                            <div class="relative pb-[150%] img-placeholder">
                                <img 
                                    src="${CONFIG.IMAGE_BASE_URL}${item.poster_path}" 
                                    alt="${title}" 
                                    class="absolute inset-0 w-full h-full object-cover"
                                    loading="lazy"
                                >
                                ${rating ? `
                                    <div class="absolute top-1.5 right-1.5 bg-black/70 text-white text-xs font-bold px-1.5 py-0.5 rounded flex items-center gap-1">
                                        <i class="fas fa-star text-yellow-500" style="font-size: 10px;"></i>
                                        ${rating}
                                    </div>
                                ` : ''}
                            </div>
                            <div class="p-2">
                                <h3 class="font-semibold text-xs sm:text-sm text-gray-800 truncate">${title}</h3>
                                <p class="text-xs text-gray-500">${year}</p>
                            </div>
                        </div>
                    </div>
                `;
            },

            grid(items, append = false) {
                if (!append) elements.contentGrid.innerHTML = '';

                const filtered = items.filter(item => item.poster_path);
                
                if (filtered.length === 0 && !append) {
                    elements.emptyState.classList.remove('hidden');
                    return;
                }

                elements.emptyState.classList.add('hidden');
                const startIndex = append ? elements.contentGrid.children.length : 0;
                
                const html = filtered.map((item, i) => this.gridCard(item, startIndex + i)).join('');
                elements.contentGrid.insertAdjacentHTML('beforeend', html);
            },

            cast(castList) {
                if (!castList?.length) {
                    elements.castSection.classList.add('hidden');
                    return;
                }

                elements.castContainer.innerHTML = castList
                    .filter(person => person.profile_path)
                    .slice(0, 10)
                    .map(person => `
                        <div class="flex-shrink-0 text-center w-20">
                            <img 
                                src="${CONFIG.IMAGE_SMALL_URL}${person.profile_path}" 
                                alt="${person.name}" 
                                class="w-16 h-16 rounded-full object-cover mb-2 border-2 border-white/20 mx-auto"
                                loading="lazy"
                            >
                            <p class="text-xs font-medium text-white truncate">${person.name}</p>
                            <p class="text-[10px] text-gray-400 truncate">${person.character}</p>
                        </div>
                    `).join('');

                elements.castSection.classList.remove('hidden');
            },

            seasons(seasons) {
                elements.seasonDropdown.innerHTML = seasons
                    .filter(s => s.season_number > 0)
                    .sort((a, b) => a.season_number - b.season_number)
                    .map(s => `<option value="${s.season_number}">${s.name} (${s.episode_count} eps)</option>`)
                    .join('');

                if (elements.seasonDropdown.querySelector('option[value="1"]')) {
                    elements.seasonDropdown.value = '1';
                }
            },

            episodes(episodes) {
                elements.episodesContainer.innerHTML = episodes.map(ep => `
                    <div class="episode-card cursor-pointer no-select" data-episode="${ep.episode_number}">
                        <div class="rounded-lg overflow-hidden shadow-lg bg-white/10">
                            <div class="relative pb-[56.25%] bg-gray-800">
                                ${ep.still_path ? `
                                    <img 
                                        src="${CONFIG.IMAGE_SMALL_URL}${ep.still_path}" 
                                        alt="${ep.name}" 
                                        class="absolute inset-0 w-full h-full object-cover"
                                        loading="lazy"
                                    >
                                ` : `
                                    <div class="absolute inset-0 flex items-center justify-center">
                                        <i class="fas fa-film text-gray-600 text-xl"></i>
                                    </div>
                                `}
                                <div class="absolute inset-0 bg-black/40 flex items-center justify-center">
                                    <i class="fas fa-play-circle text-white text-3xl opacity-80"></i>
                                </div>
                            </div>
                            <div class="p-2">
                                <p class="text-[10px] text-gray-400">Episode ${ep.episode_number}</p>
                                <h4 class="font-semibold text-xs text-white truncate">${ep.name}</h4>
                            </div>
                        </div>
                    </div>
                `).join('');
            }
        };

        // ==========================================
        // VIEW FUNCTIONS
        // ==========================================
        const views = {
            showHome() {
                state.currentView = 'home';
                state.currentSearchTerm = '';
                elements.homeView.classList.remove('hidden');
                elements.gridView.classList.add('hidden');
                utils.updateMobileNav(elements.navHome);
                utils.scrollToTop(); // Scroll to top when showing home
            },

            showGrid(title, type, endpoint) {
                state.currentView = 'grid';
                state.currentType = type;
                state.currentEndpoint = endpoint;
                state.currentPage = 1;
                
                elements.homeView.classList.add('hidden');
                elements.gridView.classList.remove('hidden');
                elements.contentTitle.textContent = title;
                elements.errorMessage.classList.add('hidden');
                elements.emptyState.classList.add('hidden');
                utils.scrollToTop(); // Scroll to top when showing grid
            }
        };

        // ==========================================
        // CONTENT FUNCTIONS
        // ==========================================
        const content = {
            async loadHome() {
                views.showHome();
                
                // Show skeletons
                const shelves = [
                    elements.trendingMoviesShelf,
                    elements.trendingTVShelf,
                    elements.popularMoviesShelf,
                    elements.popularTVShelf,
                    elements.topRatedMoviesShelf,
                    elements.topRatedTVShelf
                ];
                
                shelves.forEach(shelf => {
                    shelf.innerHTML = utils.createShelfSkeletons(8);
                });

                try {
                    const [
                        trendingMovies,
                        trendingTV,
                        popularMovies,
                        popularTV,
                        topRatedMovies,
                        topRatedTV
                    ] = await Promise.all([
                        api.getTrending('movie'),
                        api.getTrending('tv'),
                        api.getPopular('movie'),
                        api.getPopular('tv'),
                        api.getTopRated('movie'),
                        api.getTopRated('tv')
                    ]);

                    render.shelf(elements.trendingMoviesShelf, trendingMovies.results, 'movie');
                    render.shelf(elements.trendingTVShelf, trendingTV.results, 'tv');
                    render.shelf(elements.popularMoviesShelf, popularMovies.results, 'movie');
                    render.shelf(elements.popularTVShelf, popularTV.results, 'tv');
                    render.shelf(elements.topRatedMoviesShelf, topRatedMovies.results, 'movie');
                    render.shelf(elements.topRatedTVShelf, topRatedTV.results, 'tv');

                } catch (error) {
                    console.error('Error loading home:', error);
                    utils.showToast('Failed to load content', 'error');
                }
            },

            async loadGrid(title, type, fetchFn) {
                views.showGrid(title, type, '');
                
                elements.loadingIndicator.classList.remove('hidden');
                elements.contentGrid.innerHTML = utils.createSkeletons(CONFIG.SKELETON_COUNT);

                try {
                    const data = await fetchFn(1);
                    state.totalPages = data.total_pages;
                    state.currentPage = 1;
                    render.grid(data.results);
                } catch (error) {
                    console.error('Error loading grid:', error);
                    elements.errorMessage.classList.remove('hidden');
                    elements.contentGrid.innerHTML = '';
                } finally {
                    elements.loadingIndicator.classList.add('hidden');
                }
            },

            async loadMore() {
                if (state.isLoading || state.currentPage >= state.totalPages || state.currentView !== 'grid') return;

                state.isLoading = true;
                state.currentPage++;
                elements.loadingMore.classList.remove('hidden');

                try {
                    let data;
                    if (state.currentSearchTerm) {
                        data = await api.search(state.currentType, state.currentSearchTerm, state.currentPage);
                    } else if (state.currentEndpoint === 'popular') {
                        data = await api.getPopular(state.currentType, state.currentPage);
                    } else if (state.currentEndpoint === 'top_rated') {
                        data = await api.getTopRated(state.currentType, state.currentPage);
                    }
                    
                    if (data) render.grid(data.results, true);
                } catch (error) {
                    state.currentPage--;
                    console.error('Error loading more:', error);
                } finally {
                    state.isLoading = false;
                    elements.loadingMore.classList.add('hidden');
                }
            },

            async search(query) {
                state.currentSearchTerm = query;
                views.showGrid(`Results for "${query}"`, state.currentType, 'search');
                
                elements.loadingIndicator.classList.remove('hidden');
                elements.contentGrid.innerHTML = utils.createSkeletons(CONFIG.SKELETON_COUNT);

                try {
                    const data = await api.search(state.currentType, query);
                    state.totalPages = data.total_pages;
                    render.grid(data.results);
                } catch (error) {
                    console.error('Search error:', error);
                    elements.errorMessage.classList.remove('hidden');
                    elements.contentGrid.innerHTML = '';
                } finally {
                    elements.loadingIndicator.classList.add('hidden');
                }
            },

            async showDetails(id, type) {
                try {
                    const [details, credits] = await Promise.all([
                        api.getDetails(type, id),
                        api.getCredits(type, id)
                    ]);

                    if (!details) return;

                    // Store IDs
                    state.currentMovieId = type === 'movie' ? id : null;
                    state.currentTVShowId = type === 'tv' ? id : null;

                    // Set backdrop
                    elements.backdropImage.src = details.backdrop_path 
                        ? `${CONFIG.BACKDROP_BASE_URL}${details.backdrop_path}` 
                        : '';

                    // Set content
                    const title = type === 'movie' ? details.title : details.name;
                    elements.detailsTitle.textContent = title;
                    elements.detailsYear.textContent = (type === 'movie' ? details.release_date : details.first_air_date)?.split('-')[0] || '';
                    elements.detailsRating.querySelector('span').textContent = details.vote_average?.toFixed(1) || 'N/A';
                    
                    const runtime = type === 'movie'
                        ? (details.runtime ? `${details.runtime} min` : '')
                        : (details.episode_run_time?.[0] ? `${details.episode_run_time[0]} min` : '');
                    elements.detailsRuntime.textContent = runtime;

                    // Genres
                    elements.detailsGenres.innerHTML = (details.genres || [])
                        .map(g => `<span class="px-3 py-1 bg-white/20 rounded-full text-xs text-white">${g.name}</span>`)
                        .join('');

                    elements.detailsOverview.textContent = details.overview || 'No overview available.';

                    // Cast
                    render.cast(credits?.cast);

                    // Type-specific UI
                    if (type === 'movie') {
                        elements.movieActions.classList.remove('hidden');
                        elements.tvShowActions.classList.add('hidden');
                    } else {
                        elements.movieActions.classList.add('hidden');
                        elements.tvShowActions.classList.remove('hidden');
                        
                        if (details.seasons) {
                            render.seasons(details.seasons);
                            this.loadEpisodes(id, elements.seasonDropdown.value);
                        }
                    }

                    // Show screen with fade in
                    elements.detailsScreen.classList.add('active');
                    elements.detailsContent.scrollTop = 0;
                    document.body.style.overflow = 'hidden';

                } catch (error) {
                    console.error('Details error:', error);
                    utils.showToast('Failed to load details', 'error');
                }
            },

            async loadEpisodes(showId, seasonNumber) {
                elements.episodesContainer.innerHTML = `
                    <div class="col-span-full flex justify-center py-8">
                        <div class="spinner w-8 h-8"></div>
                    </div>
                `;

                try {
                    const data = await api.getSeason(showId, seasonNumber);
                    if (data?.episodes) render.episodes(data.episodes);
                } catch (error) {
                    elements.episodesContainer.innerHTML = `
                        <div class="col-span-full text-center py-8 text-gray-400">Failed to load episodes</div>
                    `;
                }
            },

            closeDetails() {
                elements.detailsScreen.classList.remove('active');
                document.body.style.overflow = '';
                elements.castSection.classList.add('hidden');
                state.currentMovieId = null;
                state.currentTVShowId = null;
            }
        };

        // ==========================================
        // SEARCH FUNCTIONS
        // ==========================================
        const search = {
            handle: utils.debounce((query) => {
                if (query.trim().length >= 2) {
                    content.search(query.trim());
                } else if (!query.trim()) {
                    content.loadHome();
                }
            }, CONFIG.DEBOUNCE_DELAY),

            openMobile() {
                elements.searchOverlay.classList.add('active');
                elements.searchPanelMobile.classList.add('active');
                elements.searchInputMobile.focus();
                utils.updateMobileNav(elements.navSearch);
            },

            closeMobile() {
                elements.searchOverlay.classList.remove('active');
                elements.searchPanelMobile.classList.remove('active');
                elements.searchInputMobile.blur();
            },

            clear() {
                elements.searchInput.value = '';
                elements.searchInputMobile.value = '';
                elements.clearSearch.classList.add('hidden');
                state.currentSearchTerm = '';
            }
        };

        // ==========================================
        // EVENT LISTENERS
        // ==========================================
        function initEventListeners() {
            // Home button - loads trending content
            elements.homeButton.addEventListener('click', () => {
                search.clear();
                content.loadHome();
            });

            // Back to home from grid
            elements.backToHome.addEventListener('click', () => {
                search.clear();
                content.loadHome();
            });

            // Desktop search
            elements.searchInput.addEventListener('input', (e) => {
                elements.clearSearch.classList.toggle('hidden', !e.target.value);
                search.handle(e.target.value);
            });
            elements.clearSearch.addEventListener('click', () => {
                search.clear();
                content.loadHome();
            });

            // Mobile search
            elements.openSearchMobile.addEventListener('click', search.openMobile);
            elements.closeSearchMobile.addEventListener('click', search.closeMobile);
            elements.searchOverlay.addEventListener('click', search.closeMobile);
            elements.searchInputMobile.addEventListener('input', (e) => search.handle(e.target.value));
            elements.navSearch.addEventListener('click', search.openMobile);

            // Desktop navigation
            elements.popularMovies.addEventListener('click', (e) => {
                e.preventDefault();
                search.clear();
                state.currentEndpoint = 'popular';
                content.loadGrid('Popular Movies', 'movie', api.getPopular.bind(api, 'movie'));
            });
            
            elements.popularTV.addEventListener('click', (e) => {
                e.preventDefault();
                search.clear();
                state.currentEndpoint = 'popular';
                content.loadGrid('Popular TV Shows', 'tv', api.getPopular.bind(api, 'tv'));
            });

            // Mobile navigation - all scroll to top
            elements.navHome.addEventListener('click', () => {
                search.clear();
                content.loadHome();
            });
            
            elements.navMovies.addEventListener('click', () => {
                search.clear();
                utils.updateMobileNav(elements.navMovies);
                state.currentEndpoint = 'popular';
                content.loadGrid('Popular Movies', 'movie', api.getPopular.bind(api, 'movie'));
            });
            
            elements.navTV.addEventListener('click', () => {
                search.clear();
                utils.updateMobileNav(elements.navTV);
                state.currentEndpoint = 'popular';
                content.loadGrid('Popular TV Shows', 'tv', api.getPopular.bind(api, 'tv'));
            });

            // See All buttons
            document.addEventListener('click', (e) => {
                const seeAllBtn = e.target.closest('[data-action]');
                if (seeAllBtn) {
                    const action = seeAllBtn.dataset.action;
                    if (action === 'see-all-movies') {
                        utils.updateMobileNav(elements.navMovies);
                        state.currentEndpoint = 'popular';
                        content.loadGrid('Popular Movies', 'movie', api.getPopular.bind(api, 'movie'));
                    } else if (action === 'see-all-tv') {
                        utils.updateMobileNav(elements.navTV);
                        state.currentEndpoint = 'popular';
                        content.loadGrid('Popular TV Shows', 'tv', api.getPopular.bind(api, 'tv'));
                    }
                }
            });

            // Card clicks (delegated)
            document.addEventListener('click', (e) => {
                const card = e.target.closest('[data-id]');
                if (card && !e.target.closest('[data-action]')) {
                    const { id, type } = card.dataset;
                    content.showDetails(id, type);
                }
            });

            // Episode clicks
            elements.episodesContainer.addEventListener('click', (e) => {
                const card = e.target.closest('[data-episode]');
                if (card && state.currentTVShowId) {
                    const season = elements.seasonDropdown.value;
                    const episode = card.dataset.episode;
                    const url = `${CONFIG.EMBED_URL}/tv/${state.currentTVShowId}/${season}/${episode}`;
                    window.open(url, '_blank');
                    utils.showToast(`Playing S${season}E${episode}`, 'success');
                }
            });

            // Details
            elements.closeDetails.addEventListener('click', content.closeDetails);
            
            elements.watchNowBtn.addEventListener('click', () => {
                if (state.currentMovieId) {
                    window.open(`${CONFIG.EMBED_URL}/movie/${state.currentMovieId}`, '_blank');
                    utils.showToast('Opening movie...', 'success');
                }
            });
            
            elements.seasonDropdown.addEventListener('change', () => {
                content.loadEpisodes(state.currentTVShowId, elements.seasonDropdown.value);
            });

            // Retry
            elements.retryButton.addEventListener('click', () => {
                elements.errorMessage.classList.add('hidden');
                if (state.currentSearchTerm) {
                    content.search(state.currentSearchTerm);
                } else {
                    content.loadHome();
                }
            });

            // Optimized scroll handler
            window.addEventListener('scroll', () => {
                if (state.scrollTicking) return;
                
                state.scrollTicking = true;
                requestAnimationFrame(() => {
                    const scrollY = window.scrollY;
                    
                    // Back to top button
                    elements.backToTop.classList.toggle('visible', scrollY > 400);
                    
                    // Infinite scroll
                    if (state.currentView === 'grid' && 
                        window.innerHeight + scrollY >= document.body.offsetHeight - CONFIG.SCROLL_THRESHOLD) {
                        content.loadMore();
                    }
                    
                    state.scrollTicking = false;
                });
            }, { passive: true });

            // Back to top - uses smooth scroll
            elements.backToTop.addEventListener('click', utils.smoothScrollToTop);

            // Keyboard
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    if (elements.detailsScreen.classList.contains('active')) {
                        content.closeDetails();
                    } else if (elements.searchPanelMobile.classList.contains('active')) {
                        search.closeMobile();
                    }
                }
            });
        }

        // ==========================================
        // INITIALIZATION
        // ==========================================
        function init() {
            initEventListeners();
            content.loadHome();
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
