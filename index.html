<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamFlix</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            background-color: #0d0d0d;
            color: #fff;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* =============================================
           FADE TRANSITION ANIMATIONS
           ============================================= */
        
        /* Fade In Animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes fadeInSlide {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes heroFade {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        /* Card fade-in with stagger support */
        .card {
            opacity: 0;
            animation: fadeInScale 0.4s ease forwards;
        }

        .card:nth-child(1) { animation-delay: 0.02s; }
        .card:nth-child(2) { animation-delay: 0.04s; }
        .card:nth-child(3) { animation-delay: 0.06s; }
        .card:nth-child(4) { animation-delay: 0.08s; }
        .card:nth-child(5) { animation-delay: 0.10s; }
        .card:nth-child(6) { animation-delay: 0.12s; }
        .card:nth-child(7) { animation-delay: 0.14s; }
        .card:nth-child(8) { animation-delay: 0.16s; }
        .card:nth-child(9) { animation-delay: 0.18s; }
        .card:nth-child(10) { animation-delay: 0.20s; }
        .card:nth-child(n+11) { animation-delay: 0.22s; }

        /* Episode card fade-in */
        .episode-card {
            opacity: 0;
            animation: fadeInSlide 0.4s ease forwards;
        }

        .episode-card:nth-child(1) { animation-delay: 0.05s; }
        .episode-card:nth-child(2) { animation-delay: 0.10s; }
        .episode-card:nth-child(3) { animation-delay: 0.15s; }
        .episode-card:nth-child(4) { animation-delay: 0.20s; }
        .episode-card:nth-child(5) { animation-delay: 0.25s; }
        .episode-card:nth-child(n+6) { animation-delay: 0.30s; }

        /* Season item fade-in */
        .season-item {
            opacity: 0;
            animation: fadeIn 0.3s ease forwards;
        }

        .season-item:nth-child(1) { animation-delay: 0.05s; }
        .season-item:nth-child(2) { animation-delay: 0.08s; }
        .season-item:nth-child(3) { animation-delay: 0.11s; }
        .season-item:nth-child(4) { animation-delay: 0.14s; }
        .season-item:nth-child(5) { animation-delay: 0.17s; }
        .season-item:nth-child(n+6) { animation-delay: 0.20s; }

        /* Page transition classes */
        .page-transition {
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .page-fade-out {
            opacity: 0;
            transform: scale(0.98);
        }

        .page-fade-in {
            opacity: 1;
            transform: scale(1);
        }

        /* Content section fade */
        .content-section {
            transition: opacity 0.4s ease;
        }

        .content-section.fading {
            opacity: 0;
        }

        /* Episodes container fade */
        .episodes-list {
            transition: opacity 0.3s ease;
        }

        .episodes-list.fading {
            opacity: 0;
        }

        /* Sidebar Navigation - Default (Desktop & Landscape) */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 70px;
            height: 100vh;
            background: linear-gradient(to right, rgba(0,0,0,0.98) 0%, rgba(0,0,0,0.85) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            z-index: 1000;
            border-right: 1px solid rgba(255,255,255,0.05);
            padding: 30px 0;
            transition: all 0.3s ease;
        }

        .nav-item {
            width: 52px;
            height: 52px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: transparent;
            border: 2px solid transparent;
        }

        .nav-item:hover {
            background: rgba(0, 120, 255, 0.15);
            transform: scale(1.1);
        }

        .nav-item.active {
            background: rgba(0, 120, 255, 0.25);
            border-color: #0088ff;
        }

        .nav-item:focus {
            outline: none;
            border-color: #00aaff;
            box-shadow: 0 0 20px rgba(0, 136, 255, 0.5);
        }

        .nav-item svg {
            width: 24px;
            height: 24px;
            fill: #0088ff;
            transition: all 0.3s ease;
        }

        .nav-item:hover svg,
        .nav-item.active svg {
            fill: #00bbff;
            filter: drop-shadow(0 0 8px rgba(0, 136, 255, 0.6));
        }

        .nav-label {
            font-size: 9px;
            margin-top: 4px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .nav-item.active .nav-label,
        .nav-item:hover .nav-label {
            color: #00bbff;
        }

        /* Main Content */
        .main-content {
            margin-left: 70px;
            min-height: 100vh;
            transition: all 0.3s ease;
        }

        /* Hero Banner - Only on Home */
        .hero-banner {
            width: 100%;
            height: 70vh;
            min-height: 500px;
            background-size: cover;
            background-position: center 20%;
            position: relative;
            display: none;
            transition: opacity 0.6s ease;
        }

        .hero-banner.active {
            display: block;
        }

        .hero-banner.hero-transitioning {
            opacity: 0;
        }

        body[data-page="movies"] .hero-banner,
        body[data-page="tv"] .hero-banner {
            display: none !important;
        }

        .hero-gradient {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                linear-gradient(to right, rgba(13,13,13,0.95) 0%, rgba(13,13,13,0.4) 50%, transparent 100%),
                linear-gradient(to top, #0d0d0d 0%, transparent 40%),
                linear-gradient(to bottom, rgba(13,13,13,0.3) 0%, transparent 20%);
        }

        .hero-content {
            position: absolute;
            bottom: 15%;
            left: 4%;
            max-width: 45%;
            z-index: 10;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .hero-content.hero-content-transitioning {
            opacity: 0;
            transform: translateY(10px);
        }

        .hero-badge {
            display: inline-block;
            background: linear-gradient(135deg, #e50914 0%, #b20710 100%);
            padding: 6px 16px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .hero-title {
            font-size: clamp(2rem, 5vw, 4rem);
            font-weight: 800;
            margin-bottom: 15px;
            text-shadow: 2px 4px 20px rgba(0,0,0,0.8);
            line-height: 1.1;
        }

        .hero-meta {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .hero-rating {
            color: #46d369;
            font-weight: 700;
        }

        .hero-year {
            color: #aaa;
        }

        .hero-overview {
            font-size: clamp(0.9rem, 1.5vw, 1.1rem);
            line-height: 1.5;
            margin-bottom: 25px;
            color: #ddd;
            text-shadow: 1px 2px 10px rgba(0,0,0,0.8);
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .hero-buttons {
            display: flex;
            gap: 15px;
        }

        .hero-btn {
            padding: 14px 35px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .hero-btn:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(0, 136, 255, 0.6);
        }

        .play-btn {
            background: #fff;
            color: #000;
        }

        .play-btn:hover {
            background: #e0e0e0;
            transform: scale(1.05);
        }

        .info-btn {
            background: rgba(109, 109, 110, 0.7);
            color: #fff;
        }

        .info-btn:hover {
            background: rgba(109, 109, 110, 0.9);
            transform: scale(1.05);
        }

        /* Content Section */
        .content-section {
            padding: 30px 4%;
            position: relative;
        }

        body[data-page="movies"] .content-section,
        body[data-page="tv"] .content-section {
            padding-top: 80px;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
            opacity: 0;
            animation: fadeIn 0.5s ease 0.1s forwards;
        }

        .section-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: #fff;
        }

        /* Dense Grid Layout */
        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
        }

        @media (min-width: 1400px) {
            .content-grid {
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
                gap: 15px;
            }
        }

        @media (min-width: 1800px) {
            .content-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            }
        }

        /* Card Styles */
        .card {
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: #1a1a1a;
            aspect-ratio: 2/3;
        }

        .card:hover {
            transform: scale(1.08);
            z-index: 20;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }

        .card:focus {
            outline: none;
            transform: scale(1.08);
            z-index: 20;
            box-shadow: 0 0 0 3px #0088ff, 0 15px 40px rgba(0,0,0,0.6);
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: opacity 0.3s ease;
        }

        .card img.img-loading {
            opacity: 0;
        }

        .card img.img-loaded {
            opacity: 1;
        }

        .card-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 60px 12px 12px;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.7) 50%, transparent 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .card:hover .card-overlay,
        .card:focus .card-overlay {
            opacity: 1;
        }

        .card-title {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
        }

        .card-rating {
            color: #46d369;
            font-weight: 600;
        }

        .card-year {
            color: #888;
        }

        .card-type {
            background: rgba(255,255,255,0.1);
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 10px;
            text-transform: uppercase;
        }

        /* Search Page */
        .search-page {
            display: none;
            position: fixed;
            top: 0;
            left: 70px;
            right: 0;
            bottom: 0;
            background: #0d0d0d;
            z-index: 900;
            overflow-y: auto;
            transition: all 0.3s ease;
            opacity: 0;
            transform: scale(0.98);
        }

        .search-page.active {
            display: block;
            opacity: 1;
            transform: scale(1);
        }

        .search-container {
            padding: 40px 4%;
        }

        .search-box {
            position: relative;
            max-width: 700px;
            margin-bottom: 40px;
            opacity: 0;
            animation: fadeIn 0.4s ease 0.1s forwards;
        }

        .search-input {
            width: 100%;
            padding: 18px 25px 18px 55px;
            font-size: 18px;
            background: #222;
            border: 2px solid #333;
            border-radius: 10px;
            color: #fff;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: #0088ff;
            background: #1a1a1a;
            box-shadow: 0 0 30px rgba(0, 136, 255, 0.2);
        }

        .search-input::placeholder {
            color: #666;
        }

        .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            width: 24px;
            height: 24px;
            fill: #666;
        }

        .search-results-title {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: #aaa;
            opacity: 0;
            animation: fadeIn 0.4s ease forwards;
        }

        /* TV Detail Page */
        .tv-detail-page {
            display: none;
            position: fixed;
            top: 0;
            left: 70px;
            right: 0;
            bottom: 0;
            background: #0d0d0d;
            z-index: 950;
            overflow-y: auto;
            transition: all 0.4s ease;
            opacity: 0;
            transform: translateY(20px);
        }

        .tv-detail-page.active {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        .tv-header {
            position: relative;
            min-height: 50vh;
            background-size: cover;
            background-position: center 20%;
        }

        .tv-header-gradient {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                linear-gradient(to right, rgba(13,13,13,0.98) 0%, rgba(13,13,13,0.6) 60%, rgba(13,13,13,0.4) 100%),
                linear-gradient(to top, #0d0d0d 0%, transparent 50%);
        }

        .tv-header-content {
            position: relative;
            z-index: 10;
            display: flex;
            gap: 40px;
            padding: 60px 4% 40px;
            opacity: 0;
            animation: fadeIn 0.5s ease 0.2s forwards;
        }

        .tv-poster {
            width: 220px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            flex-shrink: 0;
            opacity: 0;
            animation: fadeInScale 0.5s ease 0.3s forwards;
        }

        .tv-info {
            flex: 1;
            padding-top: 20px;
        }

        .tv-title {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 15px;
        }

        .tv-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
            color: #aaa;
            font-size: 14px;
        }

        .tv-meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tv-rating {
            color: #46d369;
            font-weight: 700;
        }

        .tv-overview {
            font-size: 15px;
            line-height: 1.6;
            color: #ccc;
            max-width: 700px;
        }

        /* TV Body - Now vertical layout */
        .tv-body {
            display: flex;
            flex-direction: column;
            min-height: 50vh;
        }

        /* Horizontal Scrolling Seasons */
        .seasons-container {
            background: rgba(0,0,0,0.4);
            border-bottom: 1px solid #222;
            padding: 20px 0;
            opacity: 0;
            animation: fadeIn 0.4s ease 0.4s forwards;
        }

        .seasons-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            margin-bottom: 15px;
        }

        .seasons-title {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .seasons-scroll-wrapper {
            position: relative;
        }

        .seasons-scroll {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 10px 30px 15px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .seasons-scroll::-webkit-scrollbar {
            display: none;
        }

        .season-item {
            flex-shrink: 0;
            padding: 14px 28px;
            cursor: pointer;
            border-radius: 30px;
            transition: all 0.3s ease;
            font-size: 14px;
            font-weight: 600;
            border: 2px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            white-space: nowrap;
        }

        .season-item:hover {
            background: rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }

        .season-item.active {
            background: linear-gradient(135deg, #0088ff, #00aaff);
            border-color: transparent;
            color: #fff;
            box-shadow: 0 4px 20px rgba(0, 136, 255, 0.4);
        }

        .season-item:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(0, 170, 255, 0.4);
        }

        /* Episodes Container */
        .episodes-container {
            flex: 1;
            padding: 30px;
            opacity: 0;
            animation: fadeIn 0.4s ease 0.5s forwards;
        }

        .episodes-header {
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .episodes-title {
            font-size: 1.4rem;
            font-weight: 700;
            transition: opacity 0.3s ease;
        }

        .episodes-count {
            color: #888;
            font-size: 14px;
        }

        /* Horizontal Episode Cards */
        .episodes-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .episode-card {
            display: flex;
            background: #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .episode-card:hover {
            background: #222;
            transform: translateX(5px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
            border-color: rgba(0, 136, 255, 0.3);
        }

        .episode-card:focus {
            outline: none;
            border-color: #0088ff;
            box-shadow: 0 0 0 3px rgba(0, 136, 255, 0.3);
        }

        .episode-thumb-container {
            position: relative;
            width: 220px;
            min-width: 220px;
            aspect-ratio: 16/9;
            background: #111;
            flex-shrink: 0;
        }

        .episode-thumb {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.3s ease;
        }

        .episode-thumb.img-loading {
            opacity: 0;
        }

        .episode-thumb.img-loaded {
            opacity: 1;
        }

        .episode-play-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            background: rgba(0,0,0,0.8);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .episode-card:hover .episode-play-icon {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1.1);
        }

        .episode-play-icon svg {
            width: 24px;
            height: 24px;
            fill: #fff;
            margin-left: 3px;
        }

        .episode-duration {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: rgba(0,0,0,0.9);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .episode-info {
            flex: 1;
            padding: 18px 22px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-width: 0;
        }

        .episode-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .episode-number {
            font-size: 13px;
            color: #0088ff;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .episode-date {
            font-size: 12px;
            color: #666;
        }

        .episode-name {
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 10px;
            line-height: 1.3;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .episode-overview {
            font-size: 13.5px;
            color: #999;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .episode-rating {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-top: 10px;
            font-size: 13px;
            color: #46d369;
            font-weight: 600;
        }

        .episode-rating svg {
            width: 14px;
            height: 14px;
            fill: #46d369;
        }

        /* Player Overlay */
        .player-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000;
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .player-overlay.active {
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 1;
        }

        .player-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .player-close {
            position: absolute;
            top: 25px;
            right: 25px;
            width: 50px;
            height: 50px;
            background: rgba(30,30,30,0.9);
            border: none;

            opacity: 0;
            animation: fadeIn 0.3s ease 0.3s forwards;

        /* Back Button */
        .back-btn {

            top: 20px;
            left: 90px;
            background: rgba(0,0,0,0.7);
            border: 2px solid rgba(255,255,255,0.2);

            border-radius: 25px;

            gap: 8px;
            transition: all 0.3s ease;

        /* Loading States */
        .loading {
            text-align: center;
            padding: 50px;

            opacity: 0;
            animation: fadeIn 0.4s ease forwards;

        .loading-spinner {
            width: 40px;

            border: 3px solid #333;
            border-top-color: #0088ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;

        @keyframes spin {

        .empty-state {
            text-align: center;

            animation: fadeIn 0.4s ease 0.2s forwards;

        /* =============================================

        @media (prefers-reduced-motion: reduce) {

    <script>
        // Configuration
        const CONFIG = {
            API_KEY: '2f4038e83265214a0dcd6ec2eb3276f5',
            BASE_URL: 'https://api.themoviedb.org/3',
            IMG_BASE: 'https://image.tmdb.org/t/p',
            EMBED_MOVIE: 'https://vidcore.net/movie',
            EMBED_TV: 'https://vidcore.net/tv'
        };

        // State
        const state = {
            currentPage: 'home',
            mediaType: 'all',
            page: 1,
            loading: false,
            hasMore: true,
            heroItem: null,
            currentTvShow: null,
            currentSeason: 1,
            searchQuery: '',
            heroRotationInterval: null,
            isTransitioning: false
        };

        // DOM Elements
        const DOM = {
            mainContent: document.getElementById('mainContent'),
            contentSection: document.getElementById('contentSection'),
            contentGrid: document.getElementById('contentGrid'),
            loadingIndicator: document.getElementById('loadingIndicator'),
            heroBanner: document.getElementById('heroBanner'),
            heroContent: document.getElementById('heroContent'),
            heroTitle: document.getElementById('heroTitle'),
            heroOverview: document.getElementById('heroOverview'),
            heroRating: document.getElementById('heroRating'),
            heroYear: document.getElementById('heroYear'),
            heroBadge: document.getElementById('heroBadge'),
            heroPlayBtn: document.getElementById('heroPlayBtn'),
            heroInfoBtn: document.getElementById('heroInfoBtn'),
            searchPage: document.getElementById('searchPage'),
            searchInput: document.getElementById('searchInput'),
            searchResults: document.getElementById('searchResults'),
            searchResultsTitle: document.getElementById('searchResultsTitle'),
            searchLoading: document.getElementById('searchLoading'),
            searchEmpty: document.getElementById('searchEmpty'),
            tvDetailPage: document.getElementById('tvDetailPage'),
            tvHeader: document.getElementById('tvHeader'),
            tvPoster: document.getElementById('tvPoster'),
            tvTitle: document.getElementById('tvTitle'),
            tvRating: document.getElementById('tvRating'),
            tvYear: document.getElementById('tvYear'),
            tvSeasons: document.getElementById('tvSeasons'),
            tvGenres: document.getElementById('tvGenres'),
            tvOverview: document.getElementById('tvOverview'),
            seasonsList: document.getElementById('seasonsList'),
            episodesGrid: document.getElementById('episodesGrid'),
            episodesTitle: document.getElementById('episodesTitle'),
            episodesCount: document.getElementById('episodesCount'),
            episodesLoading: document.getElementById('episodesLoading'),
            playerOverlay: document.getElementById('playerOverlay'),
            playerIframe: document.getElementById('playerIframe'),
            sectionTitle: document.getElementById('sectionTitle')
        };

        // Hero rotation items
        let heroRotationItems = [];
        let currentHeroIndex = 0;

        // API Functions
        async function fetchAPI(endpoint) {
            const separator = endpoint.includes('?') ? '&' : '?';
            const url = `${CONFIG.BASE_URL}${endpoint}${separator}api_key=${CONFIG.API_KEY}`;
            const response = await fetch(url);
            if (!response.ok) throw new Error('API request failed');
            return response.json();
        }

        function getImageUrl(path, size = 'w500') {
            return path ? `${CONFIG.IMG_BASE}/${size}${path}` : null;
        }

        // Scroll to top function
        function scrollToTop() {
            window.scrollTo({
                top: 0,
                behavior: 'instant'
            });
        }

        // Fade transition helper
        function fadeTransition(element, callback, duration = 300) {
            element.style.opacity = '0';
            element.style.transform = 'translateY(10px)';
            
            setTimeout(() => {
                callback();
                element.style.transition = `opacity ${duration}ms ease, transform ${duration}ms ease`;
                element.style.opacity = '1';
                element.style.transform = 'translateY(0)';
            }, duration);
        }

        // Hero rotation function with fade
        function startHeroRotation() {
            if (state.heroRotationInterval) {
                clearInterval(state.heroRotationInterval);
            }

            if (state.currentPage === 'home' && heroRotationItems.length > 1) {
                state.heroRotationInterval = setInterval(() => {
                    currentHeroIndex = (currentHeroIndex + 1) % heroRotationItems.length;
                    updateHeroBannerWithFade(heroRotationItems[currentHeroIndex]);
                }, 8000);
            }
        }

        function stopHeroRotation() {
            if (state.heroRotationInterval) {
                clearInterval(state.heroRotationInterval);
                state.heroRotationInterval = null;
            }
        }

        // Update hero with fade transition
        function updateHeroBannerWithFade(item) {
            const heroContent = DOM.heroContent;
            
            // Fade out content
            heroContent.classList.add('hero-content-transitioning');
            
            setTimeout(() => {
                // Update content
                updateHeroBannerContent(item);
                
                // Preload new background
                const backdropUrl = getImageUrl(item.backdrop_path, 'w1280');
                const img = new Image();
                img.onload = () => {
                    DOM.heroBanner.style.backgroundImage = `url(${backdropUrl})`;
                    // Fade in content
                    heroContent.classList.remove('hero-content-transitioning');
                };
                img.src = backdropUrl;
            }, 500);
        }

        function updateHeroBannerContent(item) {
            DOM.heroTitle.textContent = item.title || item.name;
            DOM.heroOverview.textContent = item.overview;
            DOM.heroRating.textContent = `★ ${item.vote_average?.toFixed(1) || 'N/A'}`;
            
            const year = (item.release_date || item.first_air_date || '').split('-')[0];
            DOM.heroYear.textContent = year;

            DOM.heroPlayBtn.onclick = () => handleMediaClick(item);
            DOM.heroInfoBtn.onclick = () => handleMediaClick(item);
        }

        function updateHeroBanner(item) {
            const backdropUrl = getImageUrl(item.backdrop_path, 'w1280');
            DOM.heroBanner.style.backgroundImage = `url(${backdropUrl})`;
            updateHeroBannerContent(item);
        }

        // Navigation
        function initNavigation() {
            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', () => navigateTo(item.dataset.page));
                item.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        navigateTo(item.dataset.page);
                    }
                });
            });
        }

        function navigateTo(pageName) {
            if (state.isTransitioning) return;
            
            state.currentPage = pageName;
            state.page = 1;
            state.hasMore = true;

            document.body.setAttribute('data-page', pageName);

            // Update nav active state
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.toggle('active', item.dataset.page === pageName);
            });

            // Hide all overlays with transitions
            DOM.searchPage.classList.remove('active');
            DOM.tvDetailPage.classList.remove('active');
            DOM.playerOverlay.classList.remove('active');
            DOM.playerIframe.src = '';

            if (pageName !== 'home') {
                stopHeroRotation();
            }

            // Fade out content grid before clearing
            DOM.contentSection.classList.add('fading');
            
            setTimeout(() => {
                DOM.contentGrid.innerHTML = '';
                DOM.loadingIndicator.innerHTML = `
                    <div class="loading-spinner"></div>
                    <p>Loading more...</p>
                `;
                
                DOM.contentSection.classList.remove('fading');

                switch(pageName) {
                    case 'home':
                        DOM.mainContent.style.display = 'block';
                        DOM.heroBanner.classList.add('active');
                        state.mediaType = 'all';
                        DOM.sectionTitle.textContent = 'Trending Now';
                        DOM.heroBadge.textContent = 'Trending';
                        scrollToTop();
                        loadContent();
                        break;
                    case 'movies':
                        DOM.mainContent.style.display = 'block';
                        DOM.heroBanner.classList.remove('active');
                        state.mediaType = 'movie';
                        DOM.sectionTitle.textContent = 'Popular Movies';
                        scrollToTop();
                        loadContent();
                        break;
                    case 'tv':
                        DOM.mainContent.style.display = 'block';
                        DOM.heroBanner.classList.remove('active');
                        state.mediaType = 'tv';
                        DOM.sectionTitle.textContent = 'Popular TV Shows';
                        scrollToTop();
                        loadContent();
                        break;
                    case 'search':
                        DOM.mainContent.style.display = 'none';
                        setTimeout(() => {
                            DOM.searchPage.classList.add('active');
                            DOM.searchInput.focus();
                        }, 50);
                        DOM.searchResults.innerHTML = '';
                        DOM.searchResultsTitle.textContent = '';
                        DOM.searchEmpty.style.display = 'block';
                        DOM.searchPage.scrollTop = 0;
                        break;
                }
            }, 300);
        }

        // Content Loading
        async function loadContent() {
            if (state.loading || !state.hasMore) return;
            state.loading = true;
            DOM.loadingIndicator.style.display = 'block';

            try {
                let endpoint;
                if (state.mediaType === 'all') {
                    endpoint = `/trending/all/week?page=${state.page}`;
                } else if (state.mediaType === 'movie') {
                    endpoint = `/movie/popular?page=${state.page}`;
                } else {
                    endpoint = `/tv/popular?page=${state.page}`;
                }

                const data = await fetchAPI(endpoint);

                if (state.page === 1 && state.currentPage === 'home' && data.results.length > 0) {
                    heroRotationItems = data.results.filter(item => item.backdrop_path && item.overview).slice(0, 8);
                    if (heroRotationItems.length > 0) {
                        currentHeroIndex = 0;
                        state.heroItem = heroRotationItems[0];
                        updateHeroBanner(state.heroItem);
                        startHeroRotation();
                    }
                }

                const filteredResults = data.results.filter(item => item.poster_path);
                renderCards(filteredResults, DOM.contentGrid);

                state.hasMore = state.page < data.total_pages && state.page < 50;
                state.page++;
            } catch (error) {
                console.error('Error loading content:', error);
            }

            state.loading = false;
            DOM.loadingIndicator.style.display = state.hasMore ? 'none' : 'block';
            if (!state.hasMore) {
                DOM.loadingIndicator.innerHTML = '<p style="color:#444">No more content to load</p>';
            }
        }

        // Card Rendering with image loading animation
        function renderCards(items, container) {
            items.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.tabIndex = 0;
                card.setAttribute('role', 'button');
                card.setAttribute('aria-label', item.title || item.name);
                card.style.animationDelay = `${Math.min(index * 0.03, 0.3)}s`;

                const posterUrl = getImageUrl(item.poster_path, 'w342');
                const year = (item.release_date || item.first_air_date || '').split('-')[0];
                const mediaType = item.media_type || state.mediaType;
                const typeLabel = mediaType === 'movie' ? 'Movie' : mediaType === 'tv' ? 'TV' : '';

                card.innerHTML = `
                    <img src="${posterUrl}" alt="${item.title || item.name}" loading="lazy" class="img-loading">
                    <div class="card-overlay">
                        <div class="card-title">${item.title || item.name}</div>
                        <div class="card-meta">
                            <span class="card-rating">★ ${item.vote_average?.toFixed(1) || 'N/A'}</span>
                            <span class="card-year">${year}</span>
                            ${typeLabel ? `<span class="card-type">${typeLabel}</span>` : ''}
                        </div>
                    </div>
                `;

                // Image load handler
                const img = card.querySelector('img');
                img.onload = () => {
                    img.classList.remove('img-loading');
                    img.classList.add('img-loaded');
                };

                card.addEventListener('click', () => handleMediaClick(item));
                card.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        handleMediaClick(item);
                    }
                });

                container.appendChild(card);
            });
        }

        function handleMediaClick(item) {
            const mediaType = item.media_type || state.mediaType;
            
            if (mediaType === 'movie' || item.title) {
                playMovie(item.id);
            } else {
                showTvDetails(item);
            }
        }

        // Movie Player
        function playMovie(movieId) {
            const embedUrl = `${CONFIG.EMBED_MOVIE}/${movieId}`;
            DOM.playerIframe.src = embedUrl;
            DOM.playerOverlay.classList.add('active');
            document.getElementById('playerClose').focus();
        }

        // TV Show Details
        async function showTvDetails(show) {
            state.currentTvShow = show;
            state.currentSeason = 1;

            DOM.tvDetailPage.classList.add('active');
            DOM.tvDetailPage.scrollTop = 0;
            DOM.episodesLoading.style.display = 'block';
            DOM.episodesGrid.innerHTML = '';

            try {
                const details = await fetchAPI(`/tv/${show.id}`);

                const backdropUrl = getImageUrl(details.backdrop_path, 'w1280');
                DOM.tvHeader.style.backgroundImage = `url(${backdropUrl})`;
                DOM.tvPoster.src = getImageUrl(details.poster_path, 'w342');
                DOM.tvPoster.alt = details.name;
                DOM.tvTitle.textContent = details.name;
                DOM.tvRating.textContent = `★ ${details.vote_average?.toFixed(1) || 'N/A'}`;
                DOM.tvYear.textContent = details.first_air_date?.split('-')[0] || '';
                DOM.tvSeasons.textContent = `${details.number_of_seasons} Season${details.number_of_seasons !== 1 ? 's' : ''}`;
                DOM.tvGenres.textContent = details.genres?.map(g => g.name).join(', ') || '';
                DOM.tvOverview.textContent = details.overview;

                // Render horizontal seasons
                DOM.seasonsList.innerHTML = '';
                const validSeasons = details.seasons.filter(s => s.season_number > 0);
                
                validSeasons.forEach((season, index) => {
                    const seasonItem = document.createElement('div');
                    seasonItem.className = `season-item ${season.season_number === 1 ? 'active' : ''}`;
                    seasonItem.tabIndex = 0;
                    seasonItem.textContent = `Season ${season.season_number}`;
                    seasonItem.dataset.season = season.season_number;
                    seasonItem.style.animationDelay = `${0.4 + (index * 0.03)}s`;

                    seasonItem.addEventListener('click', () => selectSeason(season.season_number));
                    seasonItem.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter' || e.key === ' ') {
                            e.preventDefault();
                            selectSeason(season.season_number);
                        }
                    });

                    DOM.seasonsList.appendChild(seasonItem);
                });

                await loadEpisodes(1);
            } catch (error) {
                console.error('Error loading TV details:', error);
            }
        }

        async function selectSeason(seasonNumber) {
            if (state.currentSeason === seasonNumber) return;
            
            state.currentSeason = seasonNumber;

            document.querySelectorAll('.season-item').forEach(item => {
                item.classList.toggle('active', parseInt(item.dataset.season) === seasonNumber);
            });

            // Scroll active season into view
            const activeItem = document.querySelector('.season-item.active');
            if (activeItem) {
                activeItem.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
            }

            // Fade out episodes before loading new ones
            DOM.episodesGrid.classList.add('fading');
            
            setTimeout(async () => {
                await loadEpisodes(seasonNumber);
                DOM.episodesGrid.classList.remove('fading');
            }, 300);
        }

        async function loadEpisodes(seasonNumber) {
            DOM.episodesLoading.style.display = 'block';
            DOM.episodesGrid.innerHTML = '';
            DOM.episodesTitle.textContent = `Season ${seasonNumber}`;

            try {
                const seasonData = await fetchAPI(`/tv/${state.currentTvShow.id}/season/${seasonNumber}`);
                
                // Update episode count
                DOM.episodesCount.textContent = `${seasonData.episodes.length} Episodes`;

                seasonData.episodes.forEach((episode, index) => {
                    const card = document.createElement('div');
                    card.className = 'episode-card';
                    card.tabIndex = 0;
                    card.setAttribute('role', 'button');
                    card.setAttribute('aria-label', `Episode ${episode.episode_number}: ${episode.name}`);
                    card.style.animationDelay = `${Math.min(index * 0.05, 0.4)}s`;

                    const thumbUrl = episode.still_path 
                        ? getImageUrl(episode.still_path, 'w300')
                        : getImageUrl(state.currentTvShow.poster_path, 'w300');

                    const runtime = episode.runtime ? `${episode.runtime}m` : '';
                    const airDate = episode.air_date ? new Date(episode.air_date).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '';
                    const rating = episode.vote_average ? episode.vote_average.toFixed(1) : null;

                    card.innerHTML = `
                        <div class="episode-thumb-container">
                            <img class="episode-thumb img-loading" src="${thumbUrl}" alt="${episode.name}" loading="lazy">
                            <div class="episode-play-icon">
                                <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                            </div>
                            ${runtime ? `<span class="episode-duration">${runtime}</span>` : ''}
                        </div>
                        <div class="episode-info">
                            <div class="episode-header">
                                <span class="episode-number">E${episode.episode_number}</span>
                                ${airDate ? `<span class="episode-date">${airDate}</span>` : ''}
                            </div>
                            <div class="episode-name">${episode.name}</div>
                            <div class="episode-overview">${episode.overview || 'No description available.'}</div>
                            ${rating ? `
                                <div class="episode-rating">
                                    <svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
                                    ${rating}
                                </div>
                            ` : ''}
                        </div>
                    `;

                    // Image load handler
                    const img = card.querySelector('.episode-thumb');
                    img.onload = () => {
                        img.classList.remove('img-loading');
                        img.classList.add('img-loaded');
                    };

                    card.addEventListener('click', () => playEpisode(seasonNumber, episode.episode_number));
                    card.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter' || e.key === ' ') {
                            e.preventDefault();
                            playEpisode(seasonNumber, episode.episode_number);
                        }
                    });

                    DOM.episodesGrid.appendChild(card);
                });
            } catch (error) {
                console.error('Error loading episodes:', error);
                DOM.episodesGrid.innerHTML = '<p style="color:#666;padding:20px;">Error loading episodes</p>';
            }

            DOM.episodesLoading.style.display = 'none';
        }

        function playEpisode(season, episode) {
            const embedUrl = `${CONFIG.EMBED_TV}/${state.currentTvShow.id}/${season}/${episode}`;
            DOM.playerIframe.src = embedUrl;
            DOM.playerOverlay.classList.add('active');
            document.getElementById('playerClose').focus();
        }

        // Search
        function initSearch() {
            let searchTimeout;
            
            DOM.searchInput.addEventListener('input', (e) => {
                clearTimeout(searchTimeout);
                const query = e.target.value.trim();
                
                if (!query) {
                    DOM.searchResults.innerHTML = '';
                    DOM.searchResultsTitle.textContent = '';
                    DOM.searchEmpty.style.display = 'block';
                    return;
                }

                DOM.searchEmpty.style.display = 'none';
                searchTimeout = setTimeout(() => performSearch(query), 400);
            });
        }

        async function performSearch(query) {
            state.searchQuery = query;
            DOM.searchLoading.style.display = 'block';
            DOM.searchResults.innerHTML = '';

            try {
                const data = await fetchAPI(`/search/multi?query=${encodeURIComponent(query)}`);
                
                const filtered = data.results.filter(item => 
                    item.poster_path && (item.media_type === 'movie' || item.media_type === 'tv')
                );

                DOM.searchResultsTitle.textContent = filtered.length > 0 
                    ? `Results for "${query}"` 
                    : `No results for "${query}"`;

                renderCards(filtered, DOM.searchResults);
            } catch (error) {
                console.error('Search error:', error);
                DOM.searchResultsTitle.textContent = 'Error searching. Please try again.';
            }

            DOM.searchLoading.style.display = 'none';
        }

        // Event Listeners
        function initEventListeners() {
            document.getElementById('playerClose').addEventListener('click', closePlayer);
            document.getElementById('playerClose').addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') closePlayer();
            });

            document.getElementById('tvBackBtn').addEventListener('click', () => {
                DOM.tvDetailPage.classList.remove('active');
            });

            window.addEventListener('scroll', handleScroll, { passive: true });
            document.addEventListener('keydown', handleKeydown);
        }

        function closePlayer() {
            DOM.playerOverlay.classList.remove('active');
            setTimeout(() => {
                DOM.playerIframe.src = '';
            }, 300);
        }

        function handleScroll() {
            if (DOM.searchPage.classList.contains('active') || 
                DOM.tvDetailPage.classList.contains('active')) return;

            const scrollHeight = document.documentElement.scrollHeight;
            const scrollTop = window.scrollY;
            const clientHeight = window.innerHeight;

            if (scrollTop + clientHeight >= scrollHeight - 800) {
                loadContent();
            }
        }

        function handleKeydown(e) {
            if (e.key === 'Escape') {
                if (DOM.playerOverlay.classList.contains('active')) {
                    closePlayer();
                } else if (DOM.tvDetailPage.classList.contains('active')) {
                    DOM.tvDetailPage.classList.remove('active');
                } else if (DOM.searchPage.classList.contains('active')) {
                    navigateTo('home');
                }
            }

            if (e.key === 'Backspace' && document.activeElement !== DOM.searchInput) {
                e.preventDefault();
                if (DOM.playerOverlay.classList.contains('active')) {
                    closePlayer();
                } else if (DOM.tvDetailPage.classList.contains('active')) {
                    DOM.tvDetailPage.classList.remove('active');
                }
            }
        }

        // Initialize
        function init() {
            initNavigation();
            initSearch();
            initEventListeners();
            navigateTo('home');
        }

        init();
    </script>
</body>
</html>
