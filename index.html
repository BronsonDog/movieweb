        <div class="sidebar-footer">
            <div class="cache-badge" id="cacheBadge">
                <span class="material-icons-round">cloud_done</span>
                <span id="cacheText">Cached</span>
            </div>
        </div>
    </aside>

    <!-- Bottom Nav (Mobile) -->
    <nav class="bottom-nav">
        <button class="nav-btn active" data-page="home">
            <span class="material-icons-round">home</span>
            Home
        </button>
        <button class="nav-btn" data-page="movies">
            <span class="material-icons-round">movie</span>
            Movies
        </button>
        <button class="nav-btn" data-page="tv">
            <span class="material-icons-round">tv</span>
            TV Shows
        </button>
        <button class="nav-btn" data-page="search">
            <span class="material-icons-round">search</span>
            Search
        </button>
    </nav>

    <!-- Main App -->
    <main class="app" id="main">
        <!-- Home Page -->
        <div class="page active" id="homePage">
            <section class="hero" id="homeHero">
                <div class="hero-bg">
                    <img class="hero-img" id="homeHeroImg" src="" alt="">
                </div>
                <div class="hero-gradient"></div>
                <div class="hero-content" id="homeHeroContent">
                    <div class="hero-tag" id="homeHeroTag">
                        <span class="material-icons-round">trending_up</span>
                        Trending
                    </div>
                    <h1 class="hero-title" id="homeHeroTitle"></h1>
                    <div class="hero-meta">
                        <span class="hero-rating">
                            <span class="material-icons-round">star</span>
                            <span id="homeHeroRating"></span>
                        </span>
                        <span class="hero-dot"></span>
                        <span id="homeHeroYear"></span>
                        <span class="hero-dot"></span>
                        <span id="homeHeroType"></span>
                    </div>
                    <p class="hero-desc" id="homeHeroDesc"></p>
                    <div class="hero-actions">
                        <button class="btn btn-primary focusable" id="homePlayBtn">
                            <span class="material-icons-round">play_arrow</span>
                            Play
                        </button>
                        <button class="btn btn-glass focusable" id="homeInfoBtn">
                            <span class="material-icons-round">info</span>
                            More Info
                        </button>
                    </div>
                </div>
            </section>
            <div id="homeRows"></div>
        </div>

        <!-- Movies Page -->
        <div class="page" id="moviesPage">
            <section class="hero" id="moviesHero">
                <div class="hero-bg">
                    <img class="hero-img" id="moviesHeroImg" src="" alt="">
                </div>
                <div class="hero-gradient"></div>
                <div class="hero-content" id="moviesHeroContent">
                    <div class="hero-tag">
                        <span class="material-icons-round">movie</span>
                        Featured
                    </div>
                    <h1 class="hero-title" id="moviesHeroTitle"></h1>
                    <div class="hero-meta">
                        <span class="hero-rating">
                            <span class="material-icons-round">star</span>
                            <span id="moviesHeroRating"></span>
                        </span>
                        <span class="hero-dot"></span>
                        <span id="moviesHeroYear"></span>
                    </div>
                    <p class="hero-desc" id="moviesHeroDesc"></p>
                    <div class="hero-actions">
                        <button class="btn btn-primary focusable" id="moviesPlayBtn">
                            <span class="material-icons-round">play_arrow</span>
                            Play
                        </button>
                    </div>
                </div>
            </section>
            <div id="moviesRows"></div>
        </div>

        <!-- TV Page -->
        <div class="page" id="tvPage">
            <section class="hero" id="tvHero">
                <div class="hero-bg">
                    <img class="hero-img" id="tvHeroImg" src="" alt="">
                </div>
                <div class="hero-gradient"></div>
                <div class="hero-content" id="tvHeroContent">
                    <div class="hero-tag">
                        <span class="material-icons-round">tv</span>
                        Featured
                    </div>
                    <h1 class="hero-title" id="tvHeroTitle"></h1>
                    <div class="hero-meta">
                        <span class="hero-rating">
                            <span class="material-icons-round">star</span>
                            <span id="tvHeroRating"></span>
                        </span>
                        <span class="hero-dot"></span>
                        <span id="tvHeroYear"></span>
                    </div>
                    <p class="hero-desc" id="tvHeroDesc"></p>
                    <div class="hero-actions">
                        <button class="btn btn-primary focusable" id="tvPlayBtn">
                            <span class="material-icons-round">play_arrow</span>
                            Play
                        </button>
                    </div>
                </div>
            </section>
            <div id="tvRows"></div>
        </div>

        <!-- Search Page -->
        <div class="page search-page" id="searchPage">
            <div class="search-box">
                <div class="search-field">
                    <span class="material-icons-round search-icon">search</span>
                    <input type="text" class="search-input" id="searchInput" placeholder="Search movies & TV shows...">
                </div>
            </div>
            <div class="grid" id="searchResults"></div>
            <div class="empty-state" id="searchEmpty">
                <span class="material-icons-round">search</span>
                <h3>Find Something to Watch</h3>
                <p>Search for movies and TV shows</p>
            </div>
            <div class="loader" id="searchLoader" style="display:none;">
                <div class="spinner"></div>
            </div>
        </div>
    </main>

    <!-- Movie Detail -->
    <div class="detail-page" id="movieDetail">
        <header class="detail-header">
            <button class="back-btn focusable" id="movieBackBtn">
                <span class="material-icons-round">arrow_back</span>
            </button>
            <h1 class="detail-name" id="movieName"></h1>
        </header>
        <section class="player-section">
            <div class="player-container" id="moviePlayerWrap">
                <iframe id="moviePlayer" allowfullscreen></iframe>
                <div class="player-controls">
                    <button class="player-btn focusable" id="movieFullscreenBtn">
                        <span class="material-icons-round">fullscreen</span>
                    </button>
                </div>
                <button class="back-btn close-fullscreen focusable" id="movieCloseFullscreen">
                    <span class="material-icons-round">close</span>
                </button>
            </div>
        </section>
        <section class="info-section" id="movieInfoSection">
            <div class="info-meta" id="movieMeta"></div>
            <p class="info-overview" id="movieOverview"></p>
            <div class="genre-list" id="movieGenres"></div>
        </section>
    </div>

    <!-- TV Detail -->
    <div class="detail-page" id="tvDetail">
        <header class="detail-header">
            <button class="back-btn focusable" id="tvBackBtn">
                <span class="material-icons-round">arrow_back</span>
            </button>
            <h1 class="detail-name" id="tvName"></h1>
        </header>
        <section class="player-section">
            <div class="player-container" id="tvPlayerWrap">
                <div class="now-playing">
                    <span class="material-icons-round">play_arrow</span>
                    <span id="nowPlayingLabel">S1 E1</span>
                </div>
                <iframe id="tvPlayer" allowfullscreen></iframe>
                <div class="player-controls">
                    <button class="player-btn focusable" id="tvFullscreenBtn">
                        <span class="material-icons-round">fullscreen</span>
                    </button>
                </div>
                <button class="back-btn close-fullscreen focusable" id="tvCloseFullscreen">
                    <span class="material-icons-round">close</span>
                </button>
            </div>
        </section>
        <div class="tv-layout">
            <aside class="seasons-panel">
                <div class="seasons-title">Seasons</div>
                <div class="seasons-scroll" id="seasonsList"></div>
            </aside>
            <section class="episodes-panel">
                <div class="episodes-head">
                    <h2 class="episodes-label" id="episodesLabel">Season 1</h2>
                    <span class="episodes-count" id="episodesCount"></span>
                </div>
                <div class="episodes-list" id="episodesList"></div>
            </section>
        </div>
        <button class="scroll-top" id="scrollTopBtn">
            <span class="material-icons-round">arrow_upward</span>
        </button>
    </div>

    <script>
        // ============================================
        // Configuration
        // ============================================
        const CONFIG = {
            API_KEY: '2f4038e83265214a0dcd6ec2eb3276f5',
            API_URL: 'https://api.themoviedb.org/3',
            IMG_URL: 'https://image.tmdb.org/t/p',
            EMBED_URL: 'https://vidcore.net',
            CACHE_TTL: 1800000, // 30 minutes
            CACHE_KEY: 'sf_'
        };

        // ============================================
        // State
        // ============================================
        const state = {
            page: 'home',
            loaded: { home: false, movies: false, tv: false },
            search: { query: '', page: 1, loading: false, hasMore: true },
            movie: { id: null, title: '' },
            tv: { id: null, title: '', season: 1, episode: 1 },
            kbdMode: false
        };

        // ============================================
        // Cache
        // ============================================
        const cache = {
            data: new Map(),

            get(key) {
                let item = this.data.get(key);
                if (!item) {
                    try {
                        const stored = localStorage.getItem(CONFIG.CACHE_KEY + key);
                        if (stored) item = JSON.parse(stored);
                    } catch (e) {}
                }
                if (item && Date.now() - item.ts < CONFIG.CACHE_TTL) {
                    return item.data;
                }
                return null;
            },

            set(key, data) {
                const item = { data, ts: Date.now() };
                this.data.set(key, item);
                try {
                    localStorage.setItem(CONFIG.CACHE_KEY + key, JSON.stringify(item));
                } catch (e) {}
            }
        };

        // ============================================
        // API
        // ============================================
        async function api(endpoint) {
            const cached = cache.get(endpoint);
            if (cached) {
                updateCacheUI(true);
                return cached;
            }

            try {
                const sep = endpoint.includes('?') ? '&' : '?';
                const res = await fetch(`${CONFIG.API_URL}${endpoint}${sep}api_key=${CONFIG.API_KEY}`);
                const data = await res.json();
                cache.set(endpoint, data);
                updateCacheUI(false);
                return data;
            } catch (err) {
                console.error('API Error:', err);
                updateCacheUI(false, true);
                return cache.get(endpoint);
            }
        }

        function updateCacheUI(fromCache, offline = false) {
            const badge = document.getElementById('cacheBadge');
            const text = document.getElementById('cacheText');
            badge.classList.toggle('offline', offline);
            text.textContent = offline ? 'Offline' : fromCache ? 'Cached' : 'Live';
        }

        // ============================================
        // Row Configurations
        // ============================================
        const ROWS = {
            home: [
                { id: 'h_trend', title: 'Trending Now', icon: 'trending_up', url: '/trending/all/week' },
                { id: 'h_movies', title: 'Popular Movies', icon: 'movie', url: '/movie/popular' },
                { id: 'h_tv', title: 'Popular TV Shows', icon: 'tv', url: '/tv/popular' },
                { id: 'h_top_movies', title: 'Top Rated Movies', icon: 'star', url: '/movie/top_rated' },
                { id: 'h_top_tv', title: 'Top Rated TV Shows', icon: 'star', url: '/tv/top_rated' }
            ],
            movies: [
                { id: 'm_now', title: 'Now Playing', icon: 'theaters', url: '/movie/now_playing' },
                { id: 'm_pop', title: 'Popular', icon: 'trending_up', url: '/movie/popular' },
                { id: 'm_top', title: 'Top Rated', icon: 'star', url: '/movie/top_rated' },
                { id: 'm_up', title: 'Upcoming', icon: 'event', url: '/movie/upcoming' },
                { id: 'm_action', title: 'Action', icon: 'sports_mma', url: '/discover/movie?with_genres=28' },
                { id: 'm_comedy', title: 'Comedy', icon: 'sentiment_very_satisfied', url: '/discover/movie?with_genres=35' },
                { id: 'm_horror', title: 'Horror', icon: 'mood_bad', url: '/discover/movie?with_genres=27' },
                { id: 'm_scifi', title: 'Sci-Fi', icon: 'rocket_launch', url: '/discover/movie?with_genres=878' }
            ],
            tv: [
                { id: 't_today', title: 'Airing Today', icon: 'live_tv', url: '/tv/airing_today' },
                { id: 't_pop', title: 'Popular', icon: 'trending_up', url: '/tv/popular' },
                { id: 't_top', title: 'Top Rated', icon: 'star', url: '/tv/top_rated' },
                { id: 't_air', title: 'On The Air', icon: 'podcasts', url: '/tv/on_the_air' },
                { id: 't_drama', title: 'Drama', icon: 'theater_comedy', url: '/discover/tv?with_genres=18' },
                { id: 't_comedy', title: 'Comedy', icon: 'sentiment_very_satisfied', url: '/discover/tv?with_genres=35' },
                { id: 't_doc', title: 'Documentary', icon: 'description', url: '/discover/tv?with_genres=99' },
                { id: 't_crime', title: 'Crime', icon: 'gavel', url: '/discover/tv?with_genres=80' }
            ]
        };

        // ============================================
        // Rendering
        // ============================================
        function rowHTML(row) {
            return `
                <section class="content-row">
                    <div class="row-header">
                        <h2 class="row-title">
                            <span class="material-icons-round">${row.icon}</span>
                            ${row.title}
                        </h2>
                        <button class="row-more focusable">
                            See All
                            <span class="material-icons-round">chevron_right</span>
                        </button>
                    </div>
                    <div class="row-wrapper">
                        <button class="scroll-btn prev focusable" data-row="${row.id}">
                            <span class="material-icons-round">chevron_left</span>
                        </button>
                        <div class="row-scroll" id="${row.id}">
                            <div class="loading-cards">
                                ${Array(10).fill('<div class="loading-card"></div>').join('')}
                            </div>
                        </div>
                        <button class="scroll-btn next focusable" data-row="${row.id}">
                            <span class="material-icons-round">chevron_right</span>
                        </button>
                    </div>
                </section>
            `;
        }

        function cardHTML(item, type) {
            const title = item.title || item.name;
            const rating = item.vote_average?.toFixed(1) || 'N/A';
            const year = (item.release_date || item.first_air_date || '').slice(0, 4);
            const poster = item.poster_path ? `${CONFIG.IMG_URL}/w342${item.poster_path}` : '';

            return `
                <img class="card-img" src="${poster}" alt="${title}" loading="lazy">
                <div class="card-play"><span class="material-icons-round">play_arrow</span></div>
                <div class="card-info">
                    <div class="card-title">${title}</div>
                    <div class="card-meta">
                        <span class="card-rating"><span class="material-icons-round">star</span>${rating}</span>
                        ${year ? `<span>${year}</span>` : ''}
                    </div>
                </div>
            `;
        }

        function createCard(item, type) {
            const card = document.createElement('div');
            card.className = 'card focusable';
            card.tabIndex = 0;
            card.dataset.id = item.id;
            card.dataset.type = type || item.media_type || (item.first_air_date ? 'tv' : 'movie');
            card.innerHTML = cardHTML(item, card.dataset.type);

            const img = card.querySelector('.card-img');
            img.onload = () => img.classList.add('loaded');
            img.onerror = () => card.remove();

            card.onclick = () => openDetail(item.id, card.dataset.type);
            card.onkeydown = e => { if (e.key === 'Enter') openDetail(item.id, card.dataset.type); };

            return card;
        }

        async function loadRow(row, type, isFirst, prefix) {
            const container = document.getElementById(row.id);
            if (!container) return;

            const data = await api(row.url);
            if (!data?.results) return;

            container.innerHTML = '';
            const items = data.results.filter(i => i.poster_path);

            if (isFirst && items.length) {
                const hero = items.find(i => i.backdrop_path) || items[0];
                setupHero(hero, prefix);
            }

            items.forEach(item => {
                container.appendChild(createCard(item, type));
            });

            initScrollBtns(row.id);
        }

        function initScrollBtns(rowId) {
            const container = document.getElementById(rowId);
            const prev = document.querySelector(`.scroll-btn.prev[data-row="${rowId}"]`);
            const next = document.querySelector(`.scroll-btn.next[data-row="${rowId}"]`);
            if (!container || !prev || !next) return;

            const update = () => {
                prev.disabled = container.scrollLeft <= 0;
                next.disabled = container.scrollLeft >= container.scrollWidth - container.clientWidth - 10;
            };

            prev.onclick = () => container.scrollBy({ left: -container.clientWidth * 0.8, behavior: 'smooth' });
            next.onclick = () => container.scrollBy({ left: container.clientWidth * 0.8, behavior: 'smooth' });
            container.onscroll = update;
            update();
        }

        // ============================================
        // Hero
        // ============================================
        function setupHero(item, prefix) {
            const img = document.getElementById(`${prefix}HeroImg`);
            const content = document.getElementById(`${prefix}HeroContent`);
            const title = document.getElementById(`${prefix}HeroTitle`);
            const rating = document.getElementById(`${prefix}HeroRating`);
            const year = document.getElementById(`${prefix}HeroYear`);
            const desc = document.getElementById(`${prefix}HeroDesc`);
            const playBtn = document.getElementById(`${prefix}PlayBtn`);
            const infoBtn = document.getElementById(`${prefix}InfoBtn`);
            const typeEl = document.getElementById(`${prefix}HeroType`);

            if (!item?.backdrop_path) return;

            img.classList.remove('loaded');
            content.classList.remove('loaded');

            const backdrop = `${CONFIG.IMG_URL}/w1280${item.backdrop_path}`;
            const tempImg = new Image();
            tempImg.onload = () => {
                img.src = backdrop;
                img.classList.add('loaded');
                content.classList.add('loaded');
            };
            tempImg.src = backdrop;

            title.textContent = item.title || item.name;
            rating.textContent = item.vote_average?.toFixed(1) || 'N/A';
            year.textContent = (item.release_date || item.first_air_date || '').slice(0, 4);
            if (desc) desc.textContent = item.overview || '';
            if (typeEl) typeEl.textContent = item.first_air_date ? 'TV Show' : 'Movie';

            const itemType = item.media_type || (item.first_air_date ? 'tv' : 'movie');
            playBtn.onclick = () => openDetail(item.id, itemType);
            if (infoBtn) infoBtn.onclick = () => openDetail(item.id, itemType);
        }

        // ============================================
        // Pages
        // ============================================
        async function loadPage(page) {
            if (state.loaded[page]) return;

            const container = document.getElementById(`${page}Rows`);
            const rows = ROWS[page];
            const type = page === 'movies' ? 'movie' : page === 'tv' ? 'tv' : null;

            container.innerHTML = rows.map(rowHTML).join('');

            for (let i = 0; i < rows.length; i++) {
                await loadRow(rows[i], type, i === 0, page);
            }

            state.loaded[page] = true;
        }

        function navigate(page) {
            state.page = page;

            document.querySelectorAll('.nav-btn, .sidebar-link').forEach(el => {
                el.classList.toggle('active', el.dataset.page === page);
            });

            document.querySelectorAll('.page').forEach(el => {
                el.classList.toggle('active', el.id === `${page}Page`);
            });

            if (page === 'home') loadPage('home');
            else if (page === 'movies') loadPage('movies');
            else if (page === 'tv') loadPage('tv');
            else if (page === 'search') document.getElementById('searchInput').focus();

            window.scrollTo(0, 0);
        }

        // ============================================
        // Search
        // ============================================
        async function search(query, reset = false) {
            const grid = document.getElementById('searchResults');
            const loader = document.getElementById('searchLoader');
            const empty = document.getElementById('searchEmpty');

            if (reset) {
                state.search = { query, page: 1, loading: false, hasMore: true };
                grid.innerHTML = '';
            }

            if (state.search.loading || !state.search.hasMore || !query) return;

            state.search.loading = true;
            loader.style.display = 'flex';
            empty.style.display = 'none';

            const data = await api(`/search/multi?query=${encodeURIComponent(query)}&page=${state.search.page}`);

            if (data?.results) {
                data.results.forEach((item, i) => {
                    if (item.media_type === 'person' || !item.poster_path) return;

                    const card = createCard(item);
                    card.classList.add('grid-card');
                    setTimeout(() => card.classList.add('visible'), i * 50);
                    grid.appendChild(card);
                });

                state.search.page++;
                state.search.hasMore = state.search.page <= data.total_pages;
            }

            state.search.loading = false;
            loader.style.display = state.search.hasMore ? 'flex' : 'none';

            if (!grid.children.length) {
                empty.style.display = 'flex';
                empty.querySelector('h3').textContent = 'No Results';
                empty.querySelector('p').textContent = 'Try a different search term';
            }
        }

        // ============================================
        // Details
        // ============================================
        function openDetail(id, type) {
            if (type === 'movie') openMovie(id);
            else openTV(id);
        }

        async function openMovie(id) {
            const page = document.getElementById('movieDetail');
            const player = document.getElementById('moviePlayer');
            const name = document.getElementById('movieName');
            const meta = document.getElementById('movieMeta');
            const overview = document.getElementById('movieOverview');
            const genres = document.getElementById('movieGenres');

            page.classList.add('active');
            document.body.style.overflow = 'hidden';
            history.pushState({ type: 'movie', id }, '');

            player.src = `${CONFIG.EMBED_URL}/movie/${id}`;
            state.movie = { id, title: '' };

            const data = await api(`/movie/${id}`);
            if (data) {
                state.movie.title = data.title;
                name.textContent = data.title;
                overview.textContent = data.overview || '';

                const yr = data.release_date?.slice(0, 4) || '';
                const rt = data.runtime ? `${Math.floor(data.runtime / 60)}h ${data.runtime % 60}m` : '';

                meta.innerHTML = `
                    <span class="meta-tag rating"><span class="material-icons-round">star</span>${data.vote_average?.toFixed(1)}</span>
                    <span class="meta-tag"><span class="material-icons-round">calendar_today</span>${yr}</span>
                    ${rt ? `<span class="meta-tag"><span class="material-icons-round">schedule</span>${rt}</span>` : ''}
                `;

                genres.innerHTML = (data.genres || []).map(g => `<span class="genre-pill">${g.name}</span>`).join('');
            }
        }

        async function openTV(id) {
            const page = document.getElementById('tvDetail');
            const name = document.getElementById('tvName');
            const seasons = document.getElementById('seasonsList');

            page.classList.add('active');
            document.body.style.overflow = 'hidden';
            history.pushState({ type: 'tv', id }, '');

            state.tv = { id, title: '', season: 1, episode: 1 };

            const data = await api(`/tv/${id}`);
            if (data) {
                state.tv.title = data.name;
                name.textContent = data.name;

                seasons.innerHTML = '';
                data.seasons.filter(s => s.season_number > 0).forEach(s => {
                    const btn = document.createElement('button');
                    btn.className = `season-btn focusable${s.season_number === 1 ? ' active' : ''}`;
                    btn.textContent = `Season ${s.season_number}`;
                    btn.onclick = () => loadSeason(id, s.season_number);
                    seasons.appendChild(btn);
                });

                await loadSeason(id, 1);
            }

            initScrollTop();
        }

        async function loadSeason(tvId, num) {
            const btns = document.querySelectorAll('#seasonsList .season-btn');
            const list = document.getElementById('episodesList');
            const label = document.getElementById('episodesLabel');
            const count = document.getElementById('episodesCount');
            const player = document.getElementById('tvPlayer');

            state.tv.season = num;
            btns.forEach(b => b.classList.toggle('active', b.textContent === `Season ${num}`));

            const data = await api(`/tv/${tvId}/season/${num}`);
            if (data?.episodes) {
                list.innerHTML = '';
                label.textContent = `Season ${num}`;
                count.textContent = `${data.episodes.length} Episodes`;

                if (data.episodes.length) {
                    player.src = `${CONFIG.EMBED_URL}/tv/${tvId}/${num}/1`;
                    state.tv.episode = 1;
                    updateNowPlaying();
                }

                data.episodes.forEach((ep, i) => {
                    const item = document.createElement('div');
                    item.className = `episode-item focusable${i === 0 ? ' active' : ''}`;
                    item.tabIndex = 0;
                    item.style.animationDelay = `${i * 0.05}s`;

                    const thumb = ep.still_path ? `${CONFIG.IMG_URL}/w300${ep.still_path}` : '';

                    item.innerHTML = `
                        <div class="episode-thumb">
                            <img src="${thumb}" alt="" onerror="this.style.display='none'">
                            <div class="episode-play">
                                <div class="episode-play-icon">
                                    <span class="material-icons-round">play_arrow</span>
                                </div>
                            </div>
                        </div>
                        <div class="episode-details">
                            <span class="episode-num">Episode ${ep.episode_number}</span>
                            <h3 class="episode-title">${ep.name}</h3>
                            <p class="episode-desc">${ep.overview || 'No description available.'}</p>
                        </div>
                    `;

                    const img = item.querySelector('img');
                    if (thumb) img.onload = () => img.classList.add('loaded');

                    item.onclick = () => playEpisode(tvId, num, ep.episode_number);
                    item.onkeydown = e => { if (e.key === 'Enter') playEpisode(tvId, num, ep.episode_number); };

                    list.appendChild(item);
                });
            }
        }

        function playEpisode(tvId, season, episode) {
            const player = document.getElementById('tvPlayer');
            const page = document.getElementById('tvDetail');

            player.src = `${CONFIG.EMBED_URL}/tv/${tvId}/${season}/${episode}`;
            state.tv.season = season;
            state.tv.episode = episode;

            updateNowPlaying();
            updateActiveEpisode();
            page.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function updateNowPlaying() {
            document.getElementById('nowPlayingLabel').textContent = `S${state.tv.season} E${state.tv.episode}`;
        }

        function updateActiveEpisode() {
            document.querySelectorAll('#episodesList .episode-item').forEach((el, i) => {
                el.classList.toggle('active', i + 1 === state.tv.episode);
            });
        }

        function initScrollTop() {
            const page = document.getElementById('tvDetail');
            const btn = document.getElementById('scrollTopBtn');

            page.onscroll = () => btn.classList.toggle('visible', page.scrollTop > 400);
            btn.onclick = () => page.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function closeDetail(type) {
            const page = document.getElementById(`${type}Detail`);
            const player = document.getElementById(`${type}Player`);
            const wrap = document.getElementById(`${type}PlayerWrap`);

            player.src = '';
            wrap.classList.remove('fullscreen');
            page.classList.remove('active');
            document.body.style.overflow = '';
        }

        // ============================================
        // Keyboard Navigation
        // ============================================
        function initKeyboard() {
            document.addEventListener('keydown', e => {
                const arrows = ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'];

                if (arrows.includes(e.key)) {
                    if (!state.kbdMode) {
                        state.kbdMode = true;
                        const hint = document.getElementById('kbdHint');
                        hint.classList.add('visible');
                        setTimeout(() => hint.classList.remove('visible'), 2500);
                    }
                    handleArrowNav(e.key, document.activeElement);
                    e.preventDefault();
                }

                if (e.key === 'Escape') {
                    const movieWrap = document.getElementById('moviePlayerWrap');
                    const tvWrap = document.getElementById('tvPlayerWrap');

                    if (movieWrap.classList.contains('fullscreen')) {
                        movieWrap.classList.remove('fullscreen');
                    } else if (tvWrap.classList.contains('fullscreen')) {
                        tvWrap.classList.remove('fullscreen');
                    } else if (document.getElementById('movieDetail').classList.contains('active')) {
                        closeDetail('movie');
                    } else if (document.getElementById('tvDetail').classList.contains('active')) {
                        closeDetail('tv');
                    }
                }
            });

            document.addEventListener('mousemove', () => {
                if (state.kbdMode) {
                    state.kbdMode = false;
                    document.getElementById('kbdHint').classList.remove('visible');
                }
            });
        }

        function handleArrowNav(key, focused) {
            if (focused.classList.contains('card')) {
                const row = focused.closest('.row-scroll');
                if (row) {
                    const cards = [...row.querySelectorAll('.card')];
                    const idx = cards.indexOf(focused);

                    if (key === 'ArrowLeft' && idx > 0) {
                        cards[idx - 1].focus();
                        scrollIntoView(cards[idx - 1], row);
                    } else if (key === 'ArrowRight' && idx < cards.length - 1) {
                        cards[idx + 1].focus();
                        scrollIntoView(cards[idx + 1], row);
                    } else if (key === 'ArrowUp' || key === 'ArrowDown') {
                        navRows(key, focused);
                    }
                }
            } else if (focused.classList.contains('nav-btn') || focused.classList.contains('sidebar-link')) {
                const items = [...document.querySelectorAll('.nav-btn, .sidebar-link')];
                const idx = items.indexOf(focused);

                if ((key === 'ArrowLeft' || key === 'ArrowUp') && idx > 0) {
                    items[idx - 1].focus();
                } else if ((key === 'ArrowRight' || key === 'ArrowDown') && idx < items.length - 1) {
                    items[idx + 1].focus();
                }
            }
        }

        function navRows(key, focused) {
            const sections = [...document.querySelectorAll('.page.active .content-row')];
            const current = focused.closest('.content-row');
            const idx = sections.indexOf(current);

            if (key === 'ArrowDown' && idx < sections.length - 1) {
                const card = sections[idx + 1].querySelector('.card');
                if (card) card.focus();
            } else if (key === 'ArrowUp' && idx > 0) {
                const card = sections[idx - 1].querySelector('.card');
                if (card) card.focus();
            }
        }

        function scrollIntoView(el, container) {
            const rect = el.getBoundingClientRect();
            const contRect = container.getBoundingClientRect();

            if (rect.left < contRect.left) {
                container.scrollBy({ left: rect.left - contRect.left - 20, behavior: 'smooth' });
            } else if (rect.right > contRect.right) {
                container.scrollBy({ left: rect.right - contRect.right + 20, behavior: 'smooth' });
            }
        }

        // ============================================
        // Infinite Scroll
        // ============================================
        function initInfiniteScroll() {
            const loader = document.getElementById('searchLoader');
            const observer = new IntersectionObserver(entries => {
                if (entries[0].isIntersecting && state.page === 'search' && state.search.query) {
                    search(state.search.query);
                }
            }, { rootMargin: '300px' });

            if (loader) observer.observe(loader);
        }

        // ============================================
        // Events
        // ============================================
        function initEvents() {
            // Navigation
            document.querySelectorAll('.nav-btn, .sidebar-link').forEach(el => {
                el.onclick = () => navigate(el.dataset.page);
            });

            // Back buttons
            document.getElementById('movieBackBtn').onclick = () => closeDetail('movie');
            document.getElementById('tvBackBtn').onclick = () => closeDetail('tv');

            // Fullscreen
            document.getElementById('movieFullscreenBtn').onclick = () => {
                document.getElementById('moviePlayerWrap').classList.add('fullscreen');
            };
            document.getElementById('tvFullscreenBtn').onclick = () => {
                document.getElementById('tvPlayerWrap').classList.add('fullscreen');
            };
            document.getElementById('movieCloseFullscreen').onclick = () => {
                document.getElementById('moviePlayerWrap').classList.remove('fullscreen');
            };
            document.getElementById('tvCloseFullscreen').onclick = () => {
                document.getElementById('tvPlayerWrap').classList.remove('fullscreen');
            };

            // Search
            let searchTimer;
            document.getElementById('searchInput').oninput = e => {
                clearTimeout(searchTimer);
                const q = e.target.value.trim();

                if (q.length >= 2) {
                    searchTimer = setTimeout(() => search(q, true), 350);
                } else if (!q) {
                    document.getElementById('searchResults').innerHTML = '';
                    document.getElementById('searchEmpty').style.display = 'flex';
                }
            };

            // Browser back
            window.onpopstate = () => {
                if (document.getElementById('movieDetail').classList.contains('active')) {
                    closeDetail('movie');
                } else if (document.getElementById('tvDetail').classList.contains('active')) {
                    closeDetail('tv');
                }
            };

            // Online/offline
            window.addEventListener('online', () => updateCacheUI(false));
            window.addEventListener('offline', () => updateCacheUI(false, true));
        }

        // ============================================
        // Initialize
        // ============================================
        async function init() {
            initEvents();
            initKeyboard();
            initInfiniteScroll();
            await loadPage('home');

            if (!navigator.onLine) updateCacheUI(false, true);
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
