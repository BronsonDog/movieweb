<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StreamFlix</title>
    <meta name="theme-color" content="#0a0a0a">
    <link rel="preconnect" href="https://api.themoviedb.org">
    <link rel="preconnect" href="https://image.tmdb.org">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #e50914;
            --primary-hover: #ff1a25;
            --primary-glow: rgba(229, 9, 20, 0.35);
            --bg-primary: #0a0a0a;
            --bg-secondary: #141414;
            --bg-tertiary: #1a1a1a;
            --bg-card: #181818;
            --bg-glass: rgba(20, 20, 20, 0.85);
            --text-primary: #ffffff;
            --text-secondary: #b3b3b3;
            --text-muted: #666666;
            --border-color: rgba(255, 255, 255, 0.1);
            --border-hover: rgba(255, 255, 255, 0.2);
            --shadow-card: 0 8px 30px rgba(0, 0, 0, 0.4);
            --shadow-glow: 0 0 40px var(--primary-glow);
            --radius-sm: 4px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-xl: 16px;
            --radius-full: 9999px;
            --sidebar-width: 220px;
            --header-height: 64px;
            --nav-height: 56px;
            --transition-fast: 150ms ease;
            --transition-normal: 250ms ease;
            --transition-slow: 400ms ease;
            --focus-ring: 0 0 0 3px var(--primary-glow);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.5;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }

        /* Focus */
        *:focus { outline: none; }
        *:focus-visible { box-shadow: var(--focus-ring); outline: none; }
        
        .focusable {
            transition: transform var(--transition-fast), box-shadow var(--transition-fast);
        }
        .focusable:focus-visible {
            transform: scale(1.02);
            z-index: 20;
        }

        /* Skip Link */
        .skip-link {
            position: fixed;
            top: -100px;
            left: 20px;
            padding: 12px 24px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: var(--radius-lg);
            font-weight: 600;
            z-index: 10000;
            transition: top var(--transition-normal);
        }
        .skip-link:focus { top: 20px; }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ============================================
           SIDEBAR - Desktop Only
           ============================================ */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            display: none;
            flex-direction: column;
            z-index: 1000;
        }

        @media (min-width: 1024px) {
            .sidebar { display: flex; }
        }

        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid var(--border-color);
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: -0.5px;
        }

        .sidebar-nav {
            flex: 1;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            border-radius: var(--radius-md);
            cursor: pointer;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            transition: all var(--transition-fast);
            position: relative;
        }

        .sidebar-link:hover {
            background: rgba(255,255,255,0.05);
            color: var(--text-primary);
        }

        .sidebar-link.active {
            background: rgba(229, 9, 20, 0.1);
            color: var(--text-primary);
        }

        .sidebar-link.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 20px;
            background: var(--primary);
            border-radius: 0 3px 3px 0;
        }

        .sidebar-link .material-icons-round {
            font-size: 22px;
        }

        .sidebar-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border-color);
        }

        .cache-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: rgba(255,255,255,0.05);
            border-radius: var(--radius-full);
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .cache-badge .material-icons-round {
            font-size: 14px;
            color: #4caf50;
        }

        .cache-badge.offline .material-icons-round {
            color: #ff9800;
        }

        /* ============================================
           BOTTOM NAV - Mobile Only
           ============================================ */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: var(--nav-height);
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
            padding-bottom: env(safe-area-inset-bottom);
        }

        @media (min-width: 1024px) {
            .bottom-nav { display: none; }
        }

        .nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            padding: 6px 16px;
            color: var(--text-muted);
            font-size: 10px;
            font-weight: 500;
            background: none;
            border: none;
            cursor: pointer;
            transition: color var(--transition-fast);
        }

        .nav-btn:hover,
        .nav-btn.active {
            color: var(--primary);
        }

        .nav-btn .material-icons-round {
            font-size: 24px;
        }

        /* ============================================
           MAIN LAYOUT
           ============================================ */
        .app {
            min-height: 100vh;
            padding-bottom: calc(var(--nav-height) + 20px);
        }

        @media (min-width: 1024px) {
            .app {
                margin-left: var(--sidebar-width);
                padding-bottom: 60px;
            }
        }

        .page {
            display: none;
        }
        .page.active {
            display: block;
        }

        /* ============================================
           HERO SECTION
           ============================================ */
        .hero {
            position: relative;
            width: 100%;
            height: 65vh;
            min-height: 380px;
            max-height: 700px;
            overflow: hidden;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }

        @media (min-width: 768px) {
            .hero { height: 70vh; max-height: 750px; }
        }

        @media (min-width: 1024px) {
            .hero { height: 80vh; max-height: 850px; }
        }

        .hero-bg {
            position: absolute;
            inset: 0;
        }

        .hero-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        .hero-img.loaded {
            opacity: 1;
        }

        .hero-gradient {
            position: absolute;
            inset: 0;
            background: 
                linear-gradient(to top, var(--bg-primary) 0%, transparent 50%),
                linear-gradient(to right, rgba(0,0,0,0.85) 0%, transparent 60%);
        }

        @media (min-width: 1024px) {
            .hero-gradient {
                background: 
                    linear-gradient(to top, var(--bg-primary) 0%, transparent 35%),
                    linear-gradient(to right, rgba(0,0,0,0.9) 0%, transparent 55%);
            }
        }

        .hero-content {
            position: absolute;
            bottom: 8%;
            left: 20px;
            right: 20px;
            max-width: 550px;
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.7s ease 0.2s;
        }

        .hero-content.loaded {
            opacity: 1;
            transform: translateY(0);
        }

        @media (min-width: 768px) {
            .hero-content { left: 40px; bottom: 12%; max-width: 580px; }
        }

        @media (min-width: 1024px) {
            .hero-content { left: 50px; bottom: 15%; max-width: 620px; }
        }

        @media (min-width: 1400px) {
            .hero-content { left: 60px; max-width: 680px; }
        }

        .hero-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            background: var(--primary);
            border-radius: var(--radius-full);
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 14px;
        }

        .hero-tag .material-icons-round {
            font-size: 14px;
        }

        .hero-title {
            font-size: 1.75rem;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 10px;
            text-shadow: 0 2px 20px rgba(0,0,0,0.5);
        }

        @media (min-width: 768px) {
            .hero-title { font-size: 2.5rem; }
        }

        @media (min-width: 1024px) {
            .hero-title { font-size: 3.25rem; margin-bottom: 14px; }
        }

        @media (min-width: 1400px) {
            .hero-title { font-size: 3.75rem; }
        }

        .hero-meta {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        @media (min-width: 1024px) {
            .hero-meta { font-size: 0.95rem; gap: 14px; }
        }

        .hero-rating {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            color: #ffc107;
            font-weight: 600;
        }

        .hero-rating .material-icons-round {
            font-size: 16px;
        }

        .hero-dot {
            width: 4px;
            height: 4px;
            background: var(--text-muted);
            border-radius: 50%;
        }

        .hero-desc {
            display: none;
            font-size: 0.95rem;
            line-height: 1.6;
            color: var(--text-secondary);
            margin-bottom: 20px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        @media (max-width: 767px) {
            .hero-desc { display: none; }
        }

        @media (min-width: 1024px) {
            .hero-desc { font-size: 1.05rem; -webkit-line-clamp: 4; }
        }

        .hero-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        @media (min-width: 768px) {
            .hero-actions { gap: 14px; }
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 11px 22px;
            font-size: 0.9rem;
            font-weight: 600;
            border: none;
            border-radius: var(--radius-full);
            cursor: pointer;
            text-decoration: none;
            transition: all var(--transition-fast);
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn .material-icons-round {
            font-size: 20px;
        }

        @media (min-width: 768px) {
            .btn { padding: 13px 28px; font-size: 0.95rem; }
            .btn .material-icons-round { font-size: 22px; }
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            box-shadow: var(--shadow-glow);
        }

        .btn-glass {
            background: rgba(255,255,255,0.15);
            color: white;
            backdrop-filter: blur(10px);
        }

        .btn-glass:hover {
            background: rgba(255,255,255,0.25);
        }

        /* ============================================
           CONTENT ROWS
           ============================================ */
        .content-row {
            padding: 28px 0;
        }

        @media (min-width: 768px) {
            .content-row { padding: 36px 0; }
        }

        @media (min-width: 1024px) {
            .content-row { padding: 44px 0; }
        }

        .row-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            margin-bottom: 14px;
        }

        @media (min-width: 768px) {
            .row-header { padding: 0 40px; margin-bottom: 18px; }
        }

        @media (min-width: 1024px) {
            .row-header { padding: 0 50px; margin-bottom: 20px; }
        }

        .row-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.15rem;
            font-weight: 700;
        }

        @media (min-width: 768px) {
            .row-title { font-size: 1.3rem; }
        }

        @media (min-width: 1024px) {
            .row-title { font-size: 1.4rem; }
        }

        .row-title .material-icons-round {
            font-size: 22px;
            color: var(--primary);
        }

        @media (min-width: 1024px) {
            .row-title .material-icons-round { font-size: 26px; }
        }

        .row-more {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 7px 14px;
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-full);
            color: var(--text-secondary);
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .row-more:hover {
            background: rgba(255,255,255,0.1);
            color: var(--text-primary);
            border-color: var(--border-hover);
        }

        .row-more .material-icons-round {
            font-size: 16px;
        }

        /* Row Scroll */
        .row-wrapper {
            position: relative;
        }

        .row-scroll {
            display: flex;
            gap: 12px;
            padding: 6px 20px 18px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }

        .row-scroll::-webkit-scrollbar {
            display: none;
        }

        @media (min-width: 768px) {
            .row-scroll { gap: 16px; padding: 6px 40px 22px; }
        }

        @media (min-width: 1024px) {
            .row-scroll { gap: 18px; padding: 6px 50px 26px; }
        }

        /* Scroll Arrows */
        .scroll-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 46px;
            height: 46px;
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 50%;
            color: white;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
            opacity: 0;
            transition: all var(--transition-fast);
        }

        @media (min-width: 1024px) {
            .scroll-btn { display: flex; }
            .row-wrapper:hover .scroll-btn:not(:disabled) { opacity: 1; }
        }

        .scroll-btn:hover {
            background: var(--primary);
            border-color: var(--primary);
        }

        .scroll-btn:disabled {
            opacity: 0 !important;
            pointer-events: none;
        }

        .scroll-btn.prev { left: 10px; }
        .scroll-btn.next { right: 10px; }

        /* ============================================
           CARDS
           ============================================ */
        .card {
            flex-shrink: 0;
            width: 135px;
            scroll-snap-align: start;
            border-radius: var(--radius-md);
            overflow: hidden;
            background: var(--bg-card);
            cursor: pointer;
            position: relative;
            transition: transform var(--transition-normal), box-shadow var(--transition-normal);
        }

        @media (min-width: 480px) { .card { width: 150px; } }
        @media (min-width: 768px) { .card { width: 170px; border-radius: var(--radius-lg); } }
        @media (min-width: 1024px) { .card { width: 185px; } }
        @media (min-width: 1400px) { .card { width: 200px; } }

        .card:hover {
            transform: scale(1.08) translateY(-10px);
            box-shadow: var(--shadow-card);
            z-index: 10;
        }

        .card:focus-visible {
            transform: scale(1.08) translateY(-10px);
            box-shadow: var(--focus-ring), var(--shadow-card);
            z-index: 10;
        }

        .card-img {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
            background: var(--bg-tertiary);
            transition: opacity var(--transition-normal);
        }

        .card-img:not(.loaded) {
            background: linear-gradient(90deg, #1a1a1a 25%, #252525 50%, #1a1a1a 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        .card-img.loaded {
            animation: none;
        }

        .card-play {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.85);
            width: 48px;
            height: 48px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all var(--transition-normal);
            box-shadow: 0 4px 20px rgba(229, 9, 20, 0.4);
        }

        .card:hover .card-play,
        .card:focus-visible .card-play {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .card-play .material-icons-round {
            font-size: 26px;
            margin-left: 3px;
        }

        .card-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 50px 10px 10px;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.5) 60%, transparent 100%);
            opacity: 0;
            transform: translateY(8px);
            transition: all var(--transition-normal);
        }

        .card:hover .card-info,
        .card:focus-visible .card-info {
            opacity: 1;
            transform: translateY(0);
        }

        @media (max-width: 767px) {
            .card-info {
                opacity: 1;
                transform: translateY(0);
                padding: 40px 8px 8px;
            }
        }

        .card-title {
            font-size: 0.8rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 3px;
        }

        @media (min-width: 768px) {
            .card-title { font-size: 0.85rem; }
        }

        .card-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        .card-rating {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            color: #ffc107;
            font-weight: 600;
        }

        .card-rating .material-icons-round {
            font-size: 11px;
        }

        /* Loading Cards */
        .loading-cards {
            display: flex;
            gap: 12px;
            padding: 0 20px;
        }

        @media (min-width: 768px) { .loading-cards { gap: 16px; padding: 0 40px; } }
        @media (min-width: 1024px) { .loading-cards { gap: 18px; padding: 0 50px; } }

        .loading-card {
            flex-shrink: 0;
            width: 135px;
            aspect-ratio: 2/3;
            background: linear-gradient(90deg, #1a1a1a 25%, #252525 50%, #1a1a1a 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: var(--radius-md);
        }

        @media (min-width: 480px) { .loading-card { width: 150px; } }
        @media (min-width: 768px) { .loading-card { width: 170px; border-radius: var(--radius-lg); } }
        @media (min-width: 1024px) { .loading-card { width: 185px; } }
        @media (min-width: 1400px) { .loading-card { width: 200px; } }

        /* ============================================
           GRID (Search Results)
           ============================================ */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(115px, 1fr));
            gap: 12px;
            padding: 0 20px;
        }

        @media (min-width: 480px) {
            .grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 14px; }
        }

        @media (min-width: 768px) {
            .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 18px; padding: 0 40px; }
        }

        @media (min-width: 1024px) {
            .grid { grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 22px; padding: 0 50px; }
        }

        @media (min-width: 1400px) {
            .grid { grid-template-columns: repeat(auto-fill, minmax(185px, 1fr)); }
        }

        .grid-card {
            border-radius: var(--radius-md);
            overflow: hidden;
            background: var(--bg-card);
            cursor: pointer;
            position: relative;
            opacity: 0;
            transform: translateY(15px);
            transition: transform var(--transition-normal), box-shadow var(--transition-normal), opacity var(--transition-normal);
        }

        .grid-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .grid-card:hover {
            transform: scale(1.05) translateY(-8px);
            box-shadow: var(--shadow-card);
            z-index: 10;
        }

        @media (min-width: 768px) {
            .grid-card { border-radius: var(--radius-lg); }
        }

        /* ============================================
           SEARCH PAGE
           ============================================ */
        .search-page {
            padding-top: 30px;
        }

        @media (min-width: 1024px) {
            .search-page { padding-top: 50px; }
        }

        .search-box {
            padding: 0 20px 30px;
            max-width: 600px;
        }

        @media (min-width: 768px) {
            .search-box { padding: 0 40px 40px; }
        }

        @media (min-width: 1024px) {
            .search-box { padding: 0 50px 50px; }
        }

        .search-field {
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 15px 20px 15px 52px;
            background: var(--bg-secondary);
            border: 2px solid var(--border-color);
            border-radius: var(--radius-full);
            color: var(--text-primary);
            font-size: 1rem;
            transition: all var(--transition-fast);
        }

        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-glow);
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        @media (min-width: 768px) {
            .search-input { padding: 17px 24px 17px 58px; font-size: 1.05rem; }
        }

        .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        @media (min-width: 768px) {
            .search-icon { left: 22px; }
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
            text-align: center;
        }

        .empty-state .material-icons-round {
            font-size: 72px;
            color: var(--text-muted);
            margin-bottom: 20px;
            opacity: 0.4;
        }

        .empty-state h3 {
            font-size: 1.2rem;
            margin-bottom: 6px;
        }

        .empty-state p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .loader {
            display: flex;
            justify-content: center;
            padding: 40px;
        }

        .spinner {
            width: 42px;
            height: 42px;
            border: 3px solid var(--border-color);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        /* ============================================
           DETAIL PAGES
           ============================================ */
        .detail-page {
            position: fixed;
            inset: 0;
            background: var(--bg-primary);
            z-index: 2000;
            overflow-y: auto;
            opacity: 0;
            visibility: hidden;
            transition: opacity var(--transition-normal), visibility var(--transition-normal);
        }

        .detail-page.active {
            opacity: 1;
            visibility: visible;
        }

        .detail-header {
            position: sticky;
            top: 0;
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 20px;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
            z-index: 100;
        }

        @media (min-width: 768px) {
            .detail-header { padding: 18px 40px; }
        }

        @media (min-width: 1024px) {
            .detail-header { padding: 18px 50px; }
        }

        .back-btn {
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            transition: background var(--transition-fast);
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        .detail-name {
            flex: 1;
            font-size: 1.1rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Video Player */
        .player-section {
            background: #000;
        }

        .player-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
        }

        @media (min-width: 1200px) {
            .player-container { max-height: 75vh; }
        }

        .player-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .player-container.fullscreen {
            position: fixed;
            inset: 0;
            z-index: 3000;
            max-height: none;
            aspect-ratio: unset;
        }

        .player-controls {
            position: absolute;
            bottom: 14px;
            right: 14px;
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        @media (min-width: 768px) {
            .player-controls { bottom: 20px; right: 20px; }
        }

        .player-btn {
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(8px);
            border: none;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .player-btn:hover {
            background: rgba(0,0,0,0.9);
            transform: scale(1.1);
        }

        .now-playing {
            position: absolute;
            top: 14px;
            left: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 7px 14px;
            background: var(--primary);
            border-radius: var(--radius-full);
            font-size: 0.8rem;
            font-weight: 600;
            z-index: 10;
            animation: pulse 2s infinite;
        }

        .now-playing .material-icons-round {
            font-size: 16px;
        }

        .close-fullscreen {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 3001;
            display: none;
        }

        .player-container.fullscreen .close-fullscreen {
            display: flex;
        }

        .player-container.fullscreen .player-controls {
            bottom: 30px;
            right: 30px;
        }

        .player-container.fullscreen .now-playing {
            display: none;
        }

        /* Info Section */
        .info-section {
            padding: 28px 20px;
            max-width: 900px;
        }

        @media (min-width: 768px) {
            .info-section { padding: 36px 40px; }
        }

        @media (min-width: 1024px) {
            .info-section { padding: 44px 50px; }
        }

        .info-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            margin-bottom: 18px;
            font-size: 0.9rem;
        }

        .meta-tag {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            color: var(--text-secondary);
        }

        .meta-tag .material-icons-round {
            font-size: 18px;
        }

        .meta-tag.rating {
            color: #ffc107;
        }

        .info-overview {
            font-size: 1rem;
            line-height: 1.7;
            color: var(--text-secondary);
            margin-bottom: 22px;
        }

        @media (min-width: 768px) {
            .info-overview { font-size: 1.05rem; }
        }

        .genre-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .genre-pill {
            padding: 7px 15px;
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-full);
            font-size: 0.82rem;
            color: var(--text-secondary);
        }

        /* TV Show Layout */
        .tv-layout {
            display: flex;
            flex-direction: column;
        }

        @media (min-width: 1024px) {
            .tv-layout { flex-direction: row; }
        }

        .seasons-panel {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
        }

        @media (min-width: 1024px) {
            .seasons-panel {
                width: 240px;
                min-width: 240px;
                border-bottom: none;
                border-right: 1px solid var(--border-color);
                max-height: calc(100vh - 160px);
                overflow-y: auto;
                position: sticky;
                top: 76px;
            }
        }

        .seasons-title {
            padding: 18px 20px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border-color);
        }

        .seasons-scroll {
            display: flex;
            gap: 8px;
            padding: 14px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .seasons-scroll::-webkit-scrollbar { display: none; }

        @media (min-width: 1024px) {
            .seasons-scroll {
                flex-direction: column;
                overflow-x: visible;
                gap: 6px;
            }
        }

        .season-btn {
            flex-shrink: 0;
            padding: 11px 18px;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-full);
            color: var(--text-secondary);
            font-size: 0.88rem;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: all var(--transition-fast);
        }

        @media (min-width: 1024px) {
            .season-btn { border-radius: var(--radius-md); text-align: left; }
        }

        .season-btn:hover {
            background: rgba(255,255,255,0.05);
            border-color: var(--border-hover);
        }

        .season-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        /* Episodes */
        .episodes-panel {
            flex: 1;
            padding: 24px 20px;
        }

        @media (min-width: 768px) {
            .episodes-panel { padding: 30px; }
        }

        @media (min-width: 1024px) {
            .episodes-panel { padding: 30px 36px; }
        }

        .episodes-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .episodes-label {
            font-size: 1.15rem;
            font-weight: 600;
        }

        .episodes-count {
            font-size: 0.88rem;
            color: var(--text-secondary);
        }

        .episodes-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        @media (min-width: 650px) {
            .episodes-list {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
                gap: 18px;
            }
        }

        .episode-item {
            display: flex;
            gap: 14px;
            padding: 14px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: all var(--transition-fast);
            opacity: 0;
            animation: fadeIn 0.4s ease forwards;
        }

        .episode-item:hover {
            background: var(--bg-tertiary);
            border-color: var(--border-hover);
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .episode-item.active {
            border-color: var(--primary);
            background: rgba(229, 9, 20, 0.08);
        }

        .episode-thumb {
            position: relative;
            width: 140px;
            min-width: 140px;
            aspect-ratio: 16/9;
            border-radius: var(--radius-md);
            overflow: hidden;
            background: var(--bg-tertiary);
        }

        .episode-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity var(--transition-normal);
        }

        .episode-thumb img.loaded {
            opacity: 1;
        }

        .episode-play {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.4);
            opacity: 0;
            transition: opacity var(--transition-fast);
        }

        .episode-item:hover .episode-play,
        .episode-item.active .episode-play {
            opacity: 1;
        }

        .episode-play-icon {
            width: 38px;
            height: 38px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .episode-play-icon .material-icons-round {
            font-size: 20px;
            margin-left: 2px;
        }

        .episode-details {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .episode-num {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 3px;
        }

        .episode-item.active .episode-num::after {
            content: ' • Now Playing';
        }

        .episode-title {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .episode-desc {
            font-size: 0.82rem;
            color: var(--text-secondary);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Episode stagger */
        .episode-item:nth-child(1) { animation-delay: 0.05s; }
        .episode-item:nth-child(2) { animation-delay: 0.1s; }
        .episode-item:nth-child(3) { animation-delay: 0.15s; }
        .episode-item:nth-child(4) { animation-delay: 0.2s; }
        .episode-item:nth-child(5) { animation-delay: 0.25s; }
        .episode-item:nth-child(6) { animation-delay: 0.3s; }
        .episode-item:nth-child(7) { animation-delay: 0.35s; }
        .episode-item:nth-child(8) { animation-delay: 0.4s; }

        /* Scroll to top button */
        .scroll-top {
            position: fixed;
            bottom: 90px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: var(--primary);
            border: none;
            border-radius: 50%;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            visibility: hidden;
            transform: translateY(15px);
            transition: all var(--transition-normal);
            z-index: 2500;
            box-shadow: 0 4px 20px rgba(229, 9, 20, 0.4);
        }

        .scroll-top.visible {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        @media (min-width: 1024px) {
            .scroll-top { bottom: 40px; right: 40px; }
        }

        /* Keyboard Hint */
        .kbd-hint {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 10px 18px;
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-full);
            font-size: 0.78rem;
            color: var(--text-secondary);
            opacity: 0;
            visibility: hidden;
            transition: all var(--transition-normal);
            z-index: 999;
            pointer-events: none;
        }

        .kbd-hint.visible {
            opacity: 1;
            visibility: visible;
        }

        .kbd-hint kbd {
            padding: 2px 7px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
        }

        @media (min-width: 1024px) {
            .kbd-hint { bottom: 50px; }
        }
    </style>
</head>
<body>
    <a href="#main" class="skip-link">Skip to content</a>

    <!-- Keyboard Hint -->
    <div class="kbd-hint" id="kbdHint">
        <span><kbd>←</kbd><kbd>→</kbd><kbd>↑</kbd><kbd>↓</kbd> Navigate</span>
        <span><kbd>Enter</kbd> Select</span>
        <span><kbd>Esc</kbd> Back</span>
    </div>

    <!-- Sidebar (Desktop) -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo">STREAMFLIX</div>
        </div>
        <nav class="sidebar-nav">
            <button class="sidebar-link active" data-page="home">
                <span class="material-icons-round">home</span>
                Home
            </button>
            <button class="sidebar-link" data-page="movies">
                <span class="material-icons-round">movie</span>
                Movies
            </button>
            <button class="sidebar-link" data-page="tv">
                <span class="material-icons-round">tv</span>
                TV Shows
            </button>
            <button class="sidebar-link" data-page="search">
                <span class="material-icons-round">search</span>
                Search
            </button>
