<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BlackStream | Premium</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    :root {
        --bg-main: #000000;
        --bg-panel: #0a0a0a;
        --bg-card: #111111;
        --bg-hover: #1a1a1a;
        --accent: #ffffff;
        --accent-color: #000000;
        --text-main: #ffffff;
        --text-muted: #888888;
        --sidebar-w: 80px;
        --nav-h: 65px;
        --trans: 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; outline: none; -webkit-tap-highlight-color: transparent; }
    
    html, body {
        width: 100vw; height: 100vh;
        background: var(--bg-main); color: var(--text-main);
        font-family: 'Inter', sans-serif;
        overflow: hidden; /* Chromeless window feel */
    }

    /* Hide Scrollbars completely for chromeless app feel */
    ::-webkit-scrollbar { display: none; }
    * { -ms-overflow-style: none; scrollbar-width: none; }

    /* App Layout */
    #app { display: flex; height: 100vh; width: 100vw; }
    
    /* Sidebar */
    nav {
        width: var(--sidebar-w); height: 100vh;
        background: var(--bg-main);
        border-right: 1px solid #1a1a1a;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 30px; z-index: 100; flex-shrink: 0;
    }

    .nav-btn {
        background: transparent; border: none; color: var(--text-muted);
        cursor: pointer; padding: 12px; border-radius: 12px;
        transition: var(--trans);
        display: flex; align-items: center; justify-content: center;
        position: relative;
    }
    .nav-btn svg { width: 24px; height: 24px; stroke-width: 1.5; transition: var(--trans); }
    .nav-btn:hover { color: var(--text-main); background: var(--bg-hover); }
    .nav-btn.active { color: var(--bg-main); background: var(--accent); }
    
    .tooltip {
        position: absolute; left: 60px; background: #222; color: #fff;
        padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 500;
        opacity: 0; pointer-events: none; transition: var(--trans);
        white-space: nowrap; transform: translateX(-10px);
    }
    .nav-btn:hover .tooltip { opacity: 1; transform: translateX(0); }

    /* Main Content */
    main {
        flex: 1; height: 100vh; overflow-y: auto; overflow-x: hidden;
        position: relative; scroll-behavior: smooth;
    }

    .page { display: none; padding-bottom: 100px; animation: fade 0.4s ease; }
    .page.active { display: block; }
    @keyframes fade { from { opacity: 0; } to { opacity: 1; } }

    /* Hero Banner */
    .hero {
        position: relative; width: 100%; height: 70vh; min-height: 400px;
        background: #111; overflow: hidden;
    }
    .hero-bg {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        object-fit: cover; opacity: 0.5; transition: opacity 1s ease;
    }
    .hero-vignette {
        position: absolute; inset: 0;
        background: linear-gradient(0deg, var(--bg-main) 0%, transparent 50%, rgba(0,0,0,0.4) 100%);
    }
    .hero-content {
        position: absolute; bottom: 10%; left: 4%; width: 90%; max-width: 600px;
        z-index: 2;
    }
    .hero-title { font-size: clamp(32px, 5vw, 56px); font-weight: 800; line-height: 1.1; margin-bottom: 10px; text-shadow: 0 4px 20px rgba(0,0,0,0.8); }
    .hero-meta { display: flex; gap: 15px; font-size: 14px; font-weight: 600; color: var(--text-muted); margin-bottom: 15px; }
    
    .desc-5-lines {
        display: -webkit-box; -webkit-line-clamp: 5; -webkit-box-orient: vertical;
        overflow: hidden; text-overflow: ellipsis;
        font-size: 15px; line-height: 1.5; color: #ccc; margin-bottom: 25px;
    }

    .btn-row { display: flex; gap: 15px; }
    .btn {
        background: var(--accent); color: var(--bg-main);
        border: none; padding: 12px 24px; border-radius: 30px; font-size: 14px; font-weight: 600;
        cursor: pointer; display: flex; align-items: center; gap: 8px; transition: var(--trans);
    }
    .btn:hover { transform: scale(1.05); }
    .btn-dark { background: rgba(255,255,255,0.1); color: #fff; backdrop-filter: blur(10px); }
    .btn-dark:hover { background: rgba(255,255,255,0.2); }

    /* Horizontal Rows */
    .row-container { margin: 40px 0; padding-left: 4%; }
    .row-title { font-size: 20px; font-weight: 700; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
    
    .cards-scroll {
        display: flex; gap: 16px; overflow-x: auto; padding-bottom: 20px; padding-right: 4%;
        scroll-snap-type: x mandatory;
    }
    .card {
        flex: 0 0 auto; width: 180px; aspect-ratio: 2/3;
        background: var(--bg-card); border-radius: 12px; overflow: hidden;
        position: relative; cursor: pointer; scroll-snap-align: start;
        transition: var(--trans);
    }
    .card:hover { transform: translateY(-8px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 10; }
    .card img { width: 100%; height: 100%; object-fit: cover; }
    
    .card-overlay {
        position: absolute; inset: 0; background: linear-gradient(0deg, rgba(0,0,0,0.9) 0%, transparent 50%);
        opacity: 0; transition: var(--trans); display: flex; flex-direction: column; justify-content: flex-end; padding: 15px;
    }
    .card:hover .card-overlay { opacity: 1; }
    .card-overlay h4 { font-size: 14px; margin-bottom: 4px; }
    .card-overlay p { font-size: 12px; color: var(--text-muted); }

    .wl-toggle {
        position: absolute; top: 10px; right: 10px; width: 32px; height: 32px;
        background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); border-radius: 50%;
        display: flex; align-items: center; justify-content: center; cursor: pointer;
        z-index: 5; opacity: 0; transition: var(--trans); border: none; color: #fff;
    }
    .card:hover .wl-toggle { opacity: 1; }
    .wl-toggle.active { opacity: 1; color: var(--accent); }
    .wl-toggle:hover { transform: scale(1.1); background: var(--accent); color: var(--bg-main); }
    .wl-toggle svg { width: 16px; height: 16px; }

    /* Modal */
    #modal-overlay {
        position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(15px);
        z-index: 2000; display: none; align-items: center; justify-content: center; opacity: 0; transition: var(--trans);
    }
    #modal-overlay.open { display: flex; opacity: 1; }
    
    .modal {
        background: var(--bg-panel); width: 90%; max-width: 800px; max-height: 90vh;
        border-radius: 20px; border: 1px solid #222; overflow-y: auto; position: relative;
        display: flex; flex-direction: column;
    }
    .modal-close {
        position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.5);
        border: none; color: #fff; width: 40px; height: 40px; border-radius: 50%;
        cursor: pointer; z-index: 10; display: flex; align-items: center; justify-content: center;
    }
    .modal-close:hover { background: #333; }
    
    .modal-header { position: relative; height: 350px; flex-shrink: 0; }
    .modal-backdrop { width: 100%; height: 100%; object-fit: cover; }
    .modal-vignette { position: absolute; inset: 0; background: linear-gradient(0deg, var(--bg-panel) 0%, transparent 100%); }
    
    .modal-body { padding: 30px; margin-top: -120px; position: relative; z-index: 2; flex: 1; }
    .modal-title { font-size: 32px; font-weight: 800; margin-bottom: 10px; }
    
    /* Thin rows for episodes */
    .season-wrap { margin-top: 30px; border-top: 1px solid #222; padding-top: 20px; }
    select {
        background: #111; color: #fff; border: 1px solid #333; padding: 10px 15px;
        border-radius: 8px; font-size: 14px; margin-bottom: 20px; cursor: pointer; font-family: inherit;
    }
    .ep-row {
        display: flex; height: 75px; background: transparent; border-bottom: 1px solid #1a1a1a;
        align-items: center; cursor: pointer; transition: var(--trans); gap: 15px; padding: 5px 10px;
        border-radius: 8px;
    }
    .ep-row:hover { background: #1a1a1a; }
    .ep-thumb { width: 110px; height: 60px; border-radius: 6px; object-fit: cover; flex-shrink: 0; background: #222; }
    .ep-info { flex: 1; display: flex; flex-direction: column; justify-content: center; overflow: hidden; }
    .ep-info h5 { font-size: 14px; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ep-info p { font-size: 12px; color: var(--text-muted); }
    .ep-play { width: 36px; height: 36px; border-radius: 50%; background: #333; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .ep-row:hover .ep-play { background: var(--accent); color: var(--bg-main); }

    /* Player Overlay */
    #player-overlay {
        position: fixed; inset: 0; background: #000; z-index: 3000;
        display: none; flex-direction: column;
    }
    #player-overlay.open { display: flex; }
    #player-frame { flex: 1; width: 100%; border: none; }
    .player-close { position: absolute; top: 20px; left: 20px; z-index: 3010; }

    /* Search & Layout Pages */
    .page-pad { padding: 40px 4%; }
    .page-title { font-size: 32px; font-weight: 800; margin-bottom: 20px; }
    .search-bar {
        width: 100%; max-width: 600px; background: #111; border: 1px solid #333;
        padding: 16px 20px; border-radius: 12px; color: #fff; font-size: 16px; margin-bottom: 40px; transition: var(--trans);
    }
    .search-bar:focus { border-color: #666; background: #1a1a1a; }
    
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }

    /* Responsive */
    @media (max-width: 768px) {
        #app { flex-direction: column-reverse; }
        nav { 
            width: 100%; height: var(--nav-h); flex-direction: row; justify-content: space-around;
            border-right: none; border-top: 1px solid #1a1a1a; gap: 0; padding: 0 10px;
        }
        main { height: calc(100vh - var(--nav-h)); padding-bottom: 20px; }
        .nav-btn { padding: 10px; }
        .tooltip { display: none; }
        .hero { height: 60vh; }
        .hero-title { font-size: 32px; }
        .modal { width: 100%; height: 100%; max-height: 100vh; border-radius: 0; }
        .modal-header { height: 250px; }
        .modal-body { margin-top: -80px; }
        .card { width: 140px; }
        .grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px;}
        .ep-thumb { width: 90px; height: 50px; }
        .player-close { left: auto; right: 20px; }
    }

    /* Loader */
    .loader {
        width: 40px; height: 40px; border: 3px solid #333; border-top-color: #fff;
        border-radius: 50%; animation: spin 1s linear infinite; margin: 40px auto;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    .hidden { display: none !important; }
</style>
</head>
<body>

<div id="app">
    <!-- Sidebar Navigation -->
    <nav>
        <button class="nav-btn active" data-target="discover" onclick="switchPage('discover')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            <span class="tooltip">Discover</span>
        </button>
        <button class="nav-btn" data-target="movies" onclick="switchPage('movies')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"></rect><line x1="7" y1="2" x2="7" y2="22"></line><line x1="17" y1="2" x2="17" y2="22"></line><line x1="2" y1="12" x2="22" y2="12"></line><line x1="2" y1="7" x2="7" y2="7"></line><line x1="2" y1="17" x2="7" y2="17"></line><line x1="17" y1="7" x2="22" y2="7"></line><line x1="17" y1="17" x2="22" y2="17"></line></svg>
            <span class="tooltip">Movies</span>
        </button>
        <button class="nav-btn" data-target="tv" onclick="switchPage('tv')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="2" y="7" width="20" height="15" rx="2" ry="2"></rect><polyline points="17 2 12 7 7 2"></polyline></svg>
            <span class="tooltip">TV Shows</span>
        </button>
        <button class="nav-btn" data-target="search" onclick="switchPage('search')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <span class="tooltip">Search</span>
        </button>
        <button class="nav-btn" data-target="watchlist" onclick="switchPage('watchlist')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
            <span class="tooltip">Watchlist</span>
        </button>
    </nav>

    <!-- Main View -->
    <main id="main">
        <!-- Discover -->
        <section id="discover" class="page active">
            <div class="hero" id="hero"></div>
            <div id="discover-rows"></div>
        </section>

        <!-- Movies -->
        <section id="movies" class="page">
            <div class="page-pad">
                <h1 class="page-title">Movies</h1>
                <div class="grid" id="movies-grid"></div>
                <div class="loader" id="movies-loader"></div> <!-- ID matches JS exactly now -->
            </div>
        </section>

        <!-- TV -->
        <section id="tv" class="page">
            <div class="page-pad">
                <h1 class="page-title">TV Shows</h1>
                <div class="grid" id="tv-grid"></div>
                <div class="loader" id="tv-loader"></div>
            </div>
        </section>

        <!-- Search -->
        <section id="search" class="page">
            <div class="page-pad">
                <input type="text" class="search-bar" id="search-input" placeholder="Search for movies or TV shows...">
                <div class="grid" id="search-grid"></div>
            </div>
        </section>

        <!-- Watchlist -->
        <section id="watchlist" class="page">
            <div class="page-pad">
                <h1 class="page-title">My Watchlist</h1>
                <div class="grid" id="watchlist-grid"></div>
            </div>
        </section>
    </main>
</div>

<!-- Modal (Details) -->
<div id="modal-overlay" onclick="if(event.target===this) closeModal()">
    <div class="modal" id="modal-content">
        <!-- Injected via JS -->
    </div>
</div>

<!-- Video Player -->
<div id="player-overlay">
    <button class="modal-close player-close" onclick="closePlayer()">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </button>
    <iframe id="player-frame" allowfullscreen></iframe>
</div>

<script>
    const API_KEY = '2f4038e83265214a0dcd6ec2eb3276f5';
    const API_BASE = 'https://api.themoviedb.org/3';
    const IMG_BASE = 'https://image.tmdb.org/t/p';
    const PLAYER_URL = 'https://movie-scraper-olive.vercel.app/?id=';

    let watchlistData = JSON.parse(localStorage.getItem('bstream_wl') || '[]');

    // Providers
    const providers = [
        { name: 'Netflix', id: 8 },
        { name: 'Amazon Prime', id: 9 },
        { name: 'Disney+', id: 337 },
        { name: 'Apple TV+', id: 350 },
        { name: 'Hulu', id: 15 },
        { name: 'HBO Max', id: 1825 }
    ];

    // Core Fetcher
    async function tmdbFetch(endpoint, params = {}) {
        let url = new URL(`${API_BASE}${endpoint}`);
        url.searchParams.append('api_key', API_KEY);
        for (let k in params) url.searchParams.append(k, params[k]);
        try {
            const res = await fetch(url);
            return await res.json();
        } catch (e) {
            console.error(e);
            return { results: [] };
        }
    }

    // Initialize App
    async function init() {
        await loadDiscover();
        initScrollObservers();
    }

    // --- NAVIGATION ---
    function switchPage(pageId) {
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelector(`[data-target="${pageId}"]`).classList.add('active');
        document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        document.getElementById('main').scrollTop = 0;

        // Note: Explicitly passing the exact loader ID to prevent errors
        if (pageId === 'movies' && document.getElementById('movies-grid').children.length === 0) {
            loadGridData('movie', 'movies-grid', 'movies-loader');
        }
        if (pageId === 'tv' && document.getElementById('tv-grid').children.length === 0) {
            loadGridData('tv', 'tv-grid', 'tv-loader');
        }
        if (pageId === 'watchlist') renderWatchlist();
        if (pageId === 'search') document.getElementById('search-input').focus();
    }

    // --- WATCHLIST LOGIC ---
    function isWl(id) { return watchlistData.some(i => i.id === id); }
    function toggleWl(e, item) {
        e.stopPropagation();
        if (isWl(item.id)) {
            watchlistData = watchlistData.filter(i => i.id !== item.id);
        } else {
            watchlistData.push(item);
        }
        localStorage.setItem('bstream_wl', JSON.stringify(watchlistData));
        
        // Update all toggle buttons in DOM for this ID
        document.querySelectorAll(`.wl-btn-${item.id}`).forEach(btn => {
            if (isWl(item.id)) btn.classList.add('active');
            else btn.classList.remove('active');
        });

        if (document.getElementById('watchlist').classList.contains('active')) renderWatchlist();
    }

    function renderWatchlist() {
        const grid = document.getElementById('watchlist-grid');
        if (watchlistData.length === 0) {
            grid.innerHTML = '<p style="color:#888; grid-column: 1/-1;">Your watchlist is empty.</p>';
            return;
        }
        grid.innerHTML = watchlistData.map(item => createCardHTML(item)).join('');
    }

    // --- HTML GENERATORS ---
    function createCardHTML(item) {
        if (!item.poster_path) return '';
        const title = item.title || item.name;
        const type = item.media_type || (item.title ? 'movie' : 'tv');
        const year = (item.release_date || item.first_air_date || '').split('-')[0];
        const active = isWl(item.id) ? 'active' : '';
        const safedata = encodeURIComponent(JSON.stringify({id: item.id, title, media_type: type, poster_path: item.poster_path, release_date: item.release_date, first_air_date: item.first_air_date}));
        
        return `
            <div class="card" onclick="openDetails(${item.id}, '${type}')">
                <img src="${IMG_BASE}/w342${item.poster_path}" loading="lazy" alt="Poster">
                <button class="wl-toggle wl-btn-${item.id} ${active}" onclick="toggleWl(event, JSON.parse(decodeURIComponent('${safedata}')))">
                    <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
                </button>
                <div class="card-overlay">
                    <h4>${title}</h4>
                    <p>${year} • ${type.toUpperCase()}</p>
                </div>
            </div>
        `;
    }

    // --- DISCOVER PAGE ---
    async function loadDiscover() {
        const trending = await tmdbFetch('/trending/all/week');
        const heroItems = trending.results.filter(i => i.backdrop_path).slice(0, 5);
        renderHero(heroItems);

        const rowsContainer = document.getElementById('discover-rows');
        
        // Setup Row Data
        const rows = [
            { id: 'trend-movie', title: 'Trending Movies', endp: '/trending/movie/week', params: {} },
            { id: 'trend-tv', title: 'Trending TV Shows', endp: '/trending/tv/week', params: {} },
        ];

        providers.forEach(p => {
            rows.push({
                id: `prov-${p.id}`, 
                title: `Popular on ${p.name}`, 
                endp: '/discover/tv', 
                params: { with_watch_providers: p.id, watch_region: 'US', sort_by: 'popularity.desc' }
            });
        });

        for (let r of rows) {
            if (r.id === 'prov-8' || r.id === 'prov-9') r.endp = '/discover/movie';

            rowsContainer.innerHTML += `
                <div class="row-container">
                    <h3 class="row-title">${r.title}</h3>
                    <div class="cards-scroll" id="${r.id}" data-page="1" data-endp="${r.endp}" data-params='${JSON.stringify(r.params)}'>
                    </div>
                </div>
            `;
        }

        // Fetch initial strictly >= 50 valid items (requires 3-4 pages)
        for (let r of rows) {
            await fetchHorizontalPages(r.id, 1, 3);
        }
    }

    function renderHero(items) {
        let idx = 0;
        const hero = document.getElementById('hero');
        
        function update() {
            const item = items[idx];
            const title = item.title || item.name;
            const type = item.media_type || (item.title ? 'movie' : 'tv');
            const year = (item.release_date || item.first_air_date || '').split('-')[0];
            const safedata = encodeURIComponent(JSON.stringify({id: item.id, title, media_type: type, poster_path: item.poster_path}));
            
            hero.innerHTML = `
                <img class="hero-bg" src="${IMG_BASE}/original${item.backdrop_path}" alt="">
                <div class="hero-vignette"></div>
                <div class="hero-content">
                    <h1 class="hero-title">${title}</h1>
                    <div class="hero-meta">
                        <span>⭐ ${item.vote_average.toFixed(1)}</span>
                        <span>${year}</span>
                        <span>${type.toUpperCase()}</span>
                    </div>
                    <div class="desc-5-lines">${item.overview}</div>
                    <div class="btn-row">
                        <button class="btn" onclick="openDetails(${item.id}, '${type}')">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                            More Info
                        </button>
                        <button class="btn btn-dark wl-btn-${item.id} ${isWl(item.id)?'active':''}" onclick="toggleWl(event, JSON.parse(decodeURIComponent('${safedata}')))">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor" stroke="none"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
                        </button>
                    </div>
                </div>
            `;
            idx = (idx + 1) % items.length;
        }
        update();
        setInterval(update, 8000);
    }

    // --- INFINITE SCROLL LOGIC ---
    
    // For horizontal rows (Minimum 50 items already loaded, but continues dynamically)
    async function fetchHorizontalPages(containerId, startPage, endPage) {
        const container = document.getElementById(containerId);
        if(!container) return;
        const endp = container.getAttribute('data-endp');
        const params = JSON.parse(container.getAttribute('data-params'));
        let type = endp.includes('movie') ? 'movie' : 'tv';

        let html = '';
        for (let p = startPage; p <= endPage; p++) {
            params.page = p;
            const data = await tmdbFetch(endp, params);
            if(data.results) {
                data.results.forEach(i => { i.media_type = i.media_type || type; });
                html += data.results.map(i => createCardHTML(i)).join('');
            }
        }
        container.insertAdjacentHTML('beforeend', html);
        container.setAttribute('data-page', endPage);
    }

    function initScrollObservers() {
        // Horizontal Rows Observer
        const mainContent = document.getElementById('main');
        mainContent.addEventListener('scroll', () => {
            // Trigger horizontal infinite scroll natively
            document.querySelectorAll('.cards-scroll').forEach(row => {
                if (row.scrollLeft + row.clientWidth >= row.scrollWidth - 300) {
                    if (row.getAttribute('data-loading') === 'true') return;
                    row.setAttribute('data-loading', 'true');
                    let currPage = parseInt(row.getAttribute('data-page'));
                    fetchHorizontalPages(row.id, currPage + 1, currPage + 1).then(() => {
                        row.setAttribute('data-loading', 'false');
                    });
                }
            });
        }, { passive: true });
    }

    // For vertical grids (Movies & TV pages)
    let gridPages = { movie: 1, tv: 1 };
    
    // Passing loaderId explicitly fixes the crash 
    async function loadGridData(type, containerId, loaderId) {
        const container = document.getElementById(containerId);
        const loader = document.getElementById(loaderId);
        if (loader) loader.classList.remove('hidden');
        
        let html = '';
        // Load 3 pages at once for infinite scroll mass
        for(let i=0; i<3; i++){
            const data = await tmdbFetch(`/${type}/popular`, { page: gridPages[type] });
            if (data.results) {
                data.results.forEach(item => { item.media_type = type; });
                html += data.results.map(item => createCardHTML(item)).join('');
            }
            gridPages[type]++;
        }
        container.insertAdjacentHTML('beforeend', html);
        if (loader) loader.classList.add('hidden');
    }

    // Vertical bottom detection
    document.getElementById('main').addEventListener('scroll', (e) => {
        const el = e.target;
        if (el.scrollHeight - el.scrollTop <= el.clientHeight + 400) {
            if (document.getElementById('movies').classList.contains('active')) {
                const l = document.getElementById('movies-loader');
                if(l && l.classList.contains('hidden')) loadGridData('movie', 'movies-grid', 'movies-loader');
            }
            if (document.getElementById('tv').classList.contains('active')) {
                const l = document.getElementById('tv-loader');
                if(l && l.classList.contains('hidden')) loadGridData('tv', 'tv-grid', 'tv-loader');
            }
        }
    });

    // --- SEARCH ---
    let searchTimeout;
    document.getElementById('search-input').addEventListener('input', (e) => {
        clearTimeout(searchTimeout);
        const q = e.target.value.trim();
        const grid = document.getElementById('search-grid');
        if (!q) { grid.innerHTML = ''; return; }
        
        searchTimeout = setTimeout(async () => {
            const data = await tmdbFetch('/search/multi', { query: q });
            const valid = data.results.filter(i => (i.media_type === 'movie' || i.media_type === 'tv') && i.poster_path);
            grid.innerHTML = valid.map(i => createCardHTML(i)).join('');
        }, 500);
    });

    // --- MODAL & DETAILS ---
    async function openDetails(id, type) {
        const overlay = document.getElementById('modal-overlay');
        const content = document.getElementById('modal-content');
        
        content.innerHTML = '<div class="loader" style="margin-top:200px;"></div>';
        overlay.classList.add('open');

        const data = await tmdbFetch(`/${type}/${id}`);
        const title = data.title || data.name;
        const year = (data.release_date || data.first_air_date || '').split('-')[0];
        const runtime = data.runtime ? `${Math.floor(data.runtime/60)}h ${data.runtime%60}m` : '';
        const safedata = encodeURIComponent(JSON.stringify({id: data.id, title, media_type: type, poster_path: data.poster_path}));

        let tvHtml = '';
        if (type === 'tv' && data.seasons) {
            const seasons = data.seasons.filter(s => s.season_number > 0);
            const options = seasons.map(s => `<option value="${s.season_number}">Season ${s.season_number}</option>`).join('');
            tvHtml = `
                <div class="season-wrap">
                    <select id="season-select" onchange="loadEpisodes(${id}, this.value)">
                        ${options}
                    </select>
                    <div id="episodes-list"></div>
                </div>
            `;
        }

        content.innerHTML = `
            <button class="modal-close" onclick="closeModal()">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
            <div class="modal-header">
                ${data.backdrop_path ? `<img class="modal-backdrop" src="${IMG_BASE}/w1280${data.backdrop_path}" alt="">` : ''}
                <div class="modal-vignette"></div>
            </div>
            <div class="modal-body">
                <h1 class="modal-title">${title}</h1>
                <div class="hero-meta">
                    <span>⭐ ${data.vote_average.toFixed(1)}</span>
                    <span>${year}</span>
                    ${runtime ? `<span>${runtime}</span>` : ''}
                    <span>${type.toUpperCase()}</span>
                </div>
                <div class="desc-5-lines" style="-webkit-line-clamp: 5;">${data.overview}</div>
                <div class="btn-row">
                    ${type === 'movie' ? `
                    <button class="btn" onclick="playMedia('${PLAYER_URL}${id}')">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                        Play Movie
                    </button>` : ''}
                    <button class="btn btn-dark wl-btn-${data.id} ${isWl(data.id)?'active':''}" onclick="toggleWl(event, JSON.parse(decodeURIComponent('${safedata}')))">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor" stroke="none"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
                        ${isWl(data.id) ? 'In Watchlist' : 'Add to Watchlist'}
                    </button>
                </div>
                ${tvHtml}
            </div>
        `;

        if (type === 'tv' && data.seasons && data.seasons.length > 0) {
            const firstValid = data.seasons.find(s => s.season_number > 0) || data.seasons[0];
            loadEpisodes(id, firstValid.season_number);
        }
    }

    async function loadEpisodes(tvId, seasonNum) {
        const list = document.getElementById('episodes-list');
        if(!list) return;
        list.innerHTML = '<div class="loader"></div>';
        
        const data = await tmdbFetch(`/tv/${tvId}/season/${seasonNum}`);
        if (!data.episodes) { list.innerHTML = '<p>No episodes found.</p>'; return; }

        list.innerHTML = data.episodes.map(ep => {
            const thumb = ep.still_path ? `${IMG_BASE}/w300${ep.still_path}` : 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';
            return `
                <div class="ep-row" onclick="playMedia('${PLAYER_URL}${tvId}&s=${seasonNum}&e=${ep.episode_number}')">
                    <img class="ep-thumb" src="${thumb}" loading="lazy" alt="Ep">
                    <div class="ep-info">
                        <h5>${ep.episode_number}. ${ep.name}</h5>
                        <p>${ep.runtime ? ep.runtime + 'm • ' : ''}${ep.air_date || ''}</p>
                    </div>
                    <div class="ep-play">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                    </div>
                </div>
            `;
        }).join('');
    }

    function closeModal() {
        document.getElementById('modal-overlay').classList.remove('open');
    }

    // --- PLAYER ---
    function playMedia(url) {
        const p = document.getElementById('player-overlay');
        const f = document.getElementById('player-frame');
        f.src = url;
        p.classList.add('open');
    }

    function closePlayer() {
        const p = document.getElementById('player-overlay');
        const f = document.getElementById('player-frame');
        f.src = '';
        p.classList.remove('open');
    }

    // Boot
    init();

</script>
</body>
</html>
